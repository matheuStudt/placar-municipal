<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súmula Digital - Súmula Eletrônica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="frontend/css/main.css">
    <style>
        /* Fixar largura dos dropdowns na súmula */
        #select-campeonato,
        #select-jogo,
        #select-rodada {
            min-width: 200px;
        }

        .placar-card {
            background: var(--bs-card-bg);
            border-radius: 15px;
            border: none;
        }

        .score-number {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
        }

        [data-bs-theme="dark"] .score-number {
            color: #60a5fa;
        }

        .btn-counter {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .val-display {
            min-width: 25px;
            text-align: center;
            font-weight: bold;
        }

        .card-atleta {
            border-bottom: 1px solid var(--bs-border-color);
            transition: 0.2s;
        }

        .card-atleta:hover {
            background-color: var(--bs-secondary-bg);
        }
        /* ===== Card de Resultado para Instagram ===== */
        #card-resultado-template {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e3a8a 40%, #1e40af 70%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
        }
        #card-resultado-template .card-bg-glow {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(59,130,246,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(99,102,241,0.2) 0%, transparent 55%);
            pointer-events: none;
        }
        #card-resultado-template .card-stripe-top,
        #card-resultado-template .card-stripe-bot {
            position: absolute;
            left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, #3b82f6, #6366f1, #3b82f6);
        }
        #card-resultado-template .card-stripe-top { top: 0; }
        #card-resultado-template .card-stripe-bot { bottom: 0; }
        #card-resultado-template .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 0 60px;
        }
        #card-resultado-template .card-badge {
            background: rgba(59,130,246,0.2);
            border: 1.5px solid rgba(99,182,255,0.4);
            border-radius: 50px;
            padding: 10px 32px;
            color: #93c5fd;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 44px;
        }
        #card-resultado-template .card-teams {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 0;
            margin-bottom: 40px;
        }
        #card-resultado-template .card-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 18px;
        }
        #card-resultado-template .team-logo-wrap {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 3px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #card-resultado-template .team-logo-wrap img {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }
        #card-resultado-template .team-logo-wrap .team-initials {
            font-size: 64px;
            font-weight: 900;
            color: rgba(255,255,255,0.6);
            line-height: 1;
        }
        #card-resultado-template .team-name {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.2;
            max-width: 280px;
        }
        #card-resultado-template .card-vs-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 0 30px;
            flex-shrink: 0;
        }
        #card-resultado-template .card-score {
            font-size: 128px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            letter-spacing: -4px;
            text-shadow: 0 4px 32px rgba(99,182,255,0.5);
        }
        #card-resultado-template .card-score-sep {
            font-size: 80px;
            font-weight: 300;
            color: rgba(255,255,255,0.35);
            line-height: 1;
        }
        #card-resultado-template .card-vs-label {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 6px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
        #card-resultado-template .card-divider {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            margin: 30px 0;
        }
        #card-resultado-template .card-meta {
            display: flex;
            align-items: center;
            gap: 24px;
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        #card-resultado-template .card-meta .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        #card-resultado-template .card-watermark {
            position: absolute;
            bottom: 28px;
            right: 40px;
            font-size: 17px;
            font-weight: 700;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            z-index: 3;
        }
        /* Botão Gerar Card */
        #btn-gerar-card {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            border: none;
            color: #fff;
            font-weight: 700;
        }
        #btn-gerar-card:hover {
            background: linear-gradient(135deg, #6d28d9 0%, #4338ca 100%);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }
        #btn-gerar-card:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
    </style>

    <link rel="icon" type="image/png" href="frontend/img/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="frontend/img/icons/favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="frontend/img/icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000">
</head>

<body data-bs-theme="light" class="overflow-x-hidden">

    <!-- Template oculto do card de resultado para Instagram -->
    <div id="card-resultado-template"></div>

    <div class="main-content-overlay" onclick="toggleSidebar()"></div>
    <div id="menu-container"></div>

    <main class="main-content">
        <header class="top-navbar shadow-sm rounded-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold" id="titulo-painel-header">Súmula de Jogo</h5>
            </div>
            <div class="d-flex align-items-center gap-2">
                <!-- Botão de tema removido -->
            </div>
        </header>

        <div class="d-flex flex-column mb-4 gap-3">
            <h2 class="fw-bold mb-0">Súmula de Jogo</h2>
            <div class="row g-2 w-100 mx-0">
                <div class="col-12 col-md-4 px-1">
                    <select class="form-select border-info fw-bold w-100" id="select-campeonato"
                        onchange="carregarRodadas()">
                        <option value="">Selecione o Campeonato...</option>
                    </select>
                </div>
                <div class="col-12 col-md-4 px-1">
                    <select class="form-select border-warning fw-bold w-100" id="select-rodada"
                        onchange="carregarJogos()" disabled>
                        <option value="">Selecione a Rodada...</option>
                    </select>
                </div>
                <div class="col-12 col-md-4 px-1">
                    <select class="form-select border-primary fw-bold w-100" id="select-jogo"
                        onchange="carregarDadosDoJogo()" disabled>
                        <option value="">Selecione o Jogo...</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card placar-card shadow-sm mb-5">
            <div class="card-body py-5">
                <div class="row align-items-center justify-content-center mx-0 w-100 text-center">
                    <div class="col-5 px-1">
                        <h3 class="fw-bold mb-3 text-uppercase text-wrap lh-sm fs-6" id="nome-mandante-display">MANDANTE
                        </h3>
                        <div class="score-number w-100" id="placar-m">0</div>
                    </div>
                    <div class="col-2 px-0 text-center">
                        <span class="fs-3 fw-light text-muted">VS</span>
                    </div>
                    <div class="col-5 px-1">
                        <h3 class="fw-bold mb-3 text-uppercase text-wrap lh-sm fs-6" id="nome-visitante-display">
                            VISITANTE</h3>
                        <div class="score-number w-100" id="placar-v">0</div>
                    </div>
                </div>

                <div id="penaltis-wrapper" class="mt-4 pt-4 border-top" style="display: none;">
                    <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2 mb-3"
                        id="toggle-penaltis-container">
                        <input class="form-check-input fs-5" type="checkbox" role="switch" id="toggle-penaltis"
                            onchange="togglePenaltisView()" style="margin-top:0;">
                        <label class="form-check-label fs-6 fw-bold text-muted text-uppercase"
                            for="toggle-penaltis">Houve decisão por pênaltis?</label>
                    </div>
                    <div id="penaltis-container" style="display: none;">
                        <h5 class="text-center text-muted fw-bold mb-3 d-none d-md-block">CONFRONTO NOS PÊNALTIS</h5>
                        <div class="row align-items-center text-center justify-content-center mx-0 w-100">
                            <div class="col-5 px-1 d-flex justify-content-center align-items-center">
                                <div class="input-group flex-nowrap border rounded bg-white shadow-sm w-100"
                                    style="max-width: 140px;">
                                    <button class="btn btn-outline-secondary px-3 py-2 fw-bold border-0 bg-light"
                                        type="button" onclick="atualizarPenalti(-1, 'mandante')"
                                        id="btn-penalti-sub-m">-</button>
                                    <span
                                        class="input-group-text px-2 fw-bold bg-white border-0 flex-grow-1 justify-content-center fs-4 text-secondary"
                                        id="placar-penalti-m">0</span>
                                    <button class="btn btn-outline-secondary px-3 py-2 fw-bold border-0 bg-light"
                                        type="button" onclick="atualizarPenalti(1, 'mandante')"
                                        id="btn-penalti-add-m">+</button>
                                </div>
                            </div>
                            <div class="col-2 px-0">
                                <span class="fs-5 fw-light text-muted">X</span>
                            </div>
                            <div class="col-5 px-1 d-flex justify-content-center align-items-center">
                                <div class="input-group flex-nowrap border rounded bg-white shadow-sm w-100"
                                    style="max-width: 140px;">
                                    <button class="btn btn-outline-secondary px-3 py-2 fw-bold border-0 bg-light"
                                        type="button" onclick="atualizarPenalti(-1, 'visitante')"
                                        id="btn-penalti-sub-v">-</button>
                                    <span
                                        class="input-group-text px-2 fw-bold bg-white border-0 flex-grow-1 justify-content-center fs-4 text-secondary"
                                        id="placar-penalti-v">0</span>
                                    <button class="btn btn-outline-secondary px-3 py-2 fw-bold border-0 bg-light"
                                        type="button" onclick="atualizarPenalti(1, 'visitante')"
                                        id="btn-penalti-add-v">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-primary text-white fw-bold">Atletas: <span id="label-mandante">Time
                            A</span></div>
                    <div class="card-body p-0" id="lista-mandante">
                        <p class="p-3 text-muted">Selecione um jogo...</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-danger text-white fw-bold">Atletas: <span id="label-visitante">Time
                            B</span></div>
                    <div class="card-body p-0" id="lista-visitante">
                        <p class="p-3 text-muted">Selecione um jogo...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-3">
                <label class="form-label fw-bold text-muted small"><i class="bi bi-camera me-1"></i> FOTO DA SÚMULA
                    (OPCIONAL)</label>
                <input type="file" id="input-foto-sumula" class="form-control" accept="image/*">
            </div>
        </div>

        <button id="btn-finalizar" class="btn btn-success w-100 py-3 fw-bold fs-5 shadow" onclick="finalizarPartida()">
            <i class="bi bi-check2-circle me-2"></i> FINALIZAR E SALVAR RESULTADO
        </button>

        <button id="btn-gerar-card" class="btn w-100 py-3 fw-bold fs-5 shadow mt-3" onclick="gerarCardResultado()" disabled>
            <i class="bi bi-instagram me-2"></i> GERAR CARD DE RESULTADO
        </button>
    </main>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="frontend/js/main.js"></script>
    <script>
        let prefeituraId = null;
        let isMaster = false; // flag de permissão MASTER

        let jogoAtivo = null;
        let golsM = 0;
        let golsV = 0;
        let penaltisM = 0;
        let penaltisV = 0;

        async function init() {
            const user = checkSession();
            if (!user) return;
            prefeituraId = user.prefeituraId;
            // Detecta se o usuário logado é MASTER
            isMaster = (user.role === 'MASTER');
            // Carregar campeonatos
            const resCamp = await fetch(`${API}/campeonatos?prefeituraId=${prefeituraId}`);
            const dataCamp = await resCamp.json();
            const campeonatos = dataCamp.campeonatos || [];
            const selectCamp = document.getElementById('select-campeonato');
            campeonatos.forEach(c => {
                selectCamp.innerHTML += `<option value="${c.id}">${formatarNomeCampeonato(c)}</option>`;
            });

            const urlParams = new URLSearchParams(window.location.search);
            const jogoId = urlParams.get('jogoId');
            if (jogoId) {
                const skelSml = Array(4).fill('<div class="p-3 d-flex justify-content-between align-items-center border-bottom"><div class="skeleton" style="height: 24px; width: 150px; border-radius: 4px;"></div><div class="d-flex gap-2">' + Array(4).fill('<div class="skeleton" style="height: 40px; width: 40px; border-radius: 4px;"></div>').join('') + '</div></div>').join('');
                document.getElementById('lista-mandante').innerHTML = skelSml;
                document.getElementById('lista-visitante').innerHTML = skelSml;

                const resDetalhes = await fetch(`${API}/jogos/${jogoId}/detalhes`);
                if (resDetalhes.ok) {
                    const dados = await resDetalhes.json();
                    selectCamp.value = dados.jogo.campeonatoId;
                    await carregarRodadas();
                    document.getElementById('select-rodada').value = dados.jogo.rodadaId || "";
                    await carregarJogos();
                    document.getElementById('select-jogo').value = jogoId;
                    carregarDadosDoJogo();
                } else {
                    document.getElementById('lista-mandante').innerHTML = '<p class="p-3 text-danger">Erro ao carregar os dados.</p>';
                    document.getElementById('lista-visitante').innerHTML = '<p class="p-3 text-danger">Erro ao carregar os dados.</p>';
                }
            }
        }

        async function carregarRodadas() {
            const campId = document.getElementById('select-campeonato').value;
            const selectRodada = document.getElementById('select-rodada');
            const selectJogo = document.getElementById('select-jogo');

            selectRodada.innerHTML = '<option value="">Selecione a Rodada...</option>';
            selectRodada.disabled = true;
            selectJogo.innerHTML = '<option value="">Selecione o Jogo...</option>';
            selectJogo.disabled = true;
            limparDadosDoJogo();

            if (!campId) return;

            const res = await fetch(`${API}/campeonatos/${campId}/rodadas`);
            const rodadas = await res.json();
            rodadas.forEach(r => {
                selectRodada.innerHTML += `<option value="${r.id}">${r.nome}</option>`;
            });
            selectRodada.disabled = false;
        }

        async function carregarJogos() {
            const campId = document.getElementById('select-campeonato').value;
            const rodadaId = document.getElementById('select-rodada').value;
            const selectJogo = document.getElementById('select-jogo');

            selectJogo.innerHTML = '<option value="">Selecione o Jogo...</option>';
            selectJogo.disabled = true;
            limparDadosDoJogo();

            if (!campId) return;

            let url = `${API}/jogos?campeonatoId=${campId}`;
            if (rodadaId) url += `&rodadaId=${rodadaId}`;

            const res = await fetch(url);
            const jogos = await res.json();

            jogos.forEach(j => {
                selectJogo.innerHTML += `<option value="${j.id}">Jogo ${j.numero}: ${j.mandanteNome} x ${j.visitanteNome}</option>`;
            });

            if (jogos.length > 0) {
                selectJogo.disabled = false;
            } else {
                selectJogo.innerHTML = '<option value="">Nenhum jogo encontrado...</option>';
            }
        }

        function limparDadosDoJogo() {
            jogoAtivo = null;
            document.getElementById('nome-mandante-display').innerText = 'MANDANTE';
            document.getElementById('nome-visitante-display').innerText = 'VISITANTE';
            document.getElementById('label-mandante').innerText = 'Time A';
            document.getElementById('label-visitante').innerText = 'Time B';
            document.getElementById('placar-m').innerText = '0';
            document.getElementById('placar-v').innerText = '0';
            document.getElementById('placar-penalti-m').innerText = '0';
            document.getElementById('placar-penalti-v').innerText = '0';
            document.getElementById('penaltis-wrapper').style.display = 'none';
            document.getElementById('penaltis-container').style.display = 'none';
            const toggle = document.getElementById('toggle-penaltis');
            if (toggle) toggle.checked = false;

            document.getElementById('lista-mandante').innerHTML = '<p class="p-3 text-muted">Selecione um jogo...</p>';
            document.getElementById('lista-visitante').innerHTML = '<p class="p-3 text-muted">Selecione um jogo...</p>';

            const btnFinalizar = document.getElementById('btn-finalizar');
            btnFinalizar.disabled = false;
            btnFinalizar.innerHTML = '<i class="bi bi-check2-circle me-2"></i> FINALIZAR E SALVAR RESULTADO';
            btnFinalizar.classList.replace('btn-secondary', 'btn-success');

            // Desabilita o botão de gerar card ao limpar o jogo
            const btnCard = document.getElementById('btn-gerar-card');
            if (btnCard) btnCard.disabled = true;
        }

        async function carregarDadosDoJogo() {
            const id = document.getElementById('select-jogo').value;
            if (!id) return;

            const skelSml = Array(4).fill('<div class="p-3 d-flex justify-content-between align-items-center border-bottom"><div class="skeleton" style="height: 24px; width: 150px; border-radius: 4px;"></div><div class="d-flex gap-2">' + Array(4).fill('<div class="skeleton" style="height: 40px; width: 40px; border-radius: 4px;"></div>').join('') + '</div></div>').join('');
            document.getElementById('lista-mandante').innerHTML = skelSml;
            document.getElementById('lista-visitante').innerHTML = skelSml;

            const res = await fetch(`${API}/jogos/${id}/detalhes`);
            const dados = await res.json();
            jogoAtivo = dados.jogo;

            // Atualiza UI
            document.getElementById('nome-mandante-display').innerText = jogoAtivo.mandanteNome;
            document.getElementById('nome-visitante-display').innerText = jogoAtivo.visitanteNome;
            document.getElementById('label-mandante').innerText = jogoAtivo.mandanteNome;
            document.getElementById('label-visitante').innerText = jogoAtivo.visitanteNome;

            golsM = jogoAtivo.golsMandante || 0;
            golsV = jogoAtivo.golsVisitante || 0;
            penaltisM = jogoAtivo.penaltisMandante || 0;
            penaltisV = jogoAtivo.penaltisVisitante || 0;

            document.getElementById('placar-m').innerText = golsM;
            document.getElementById('placar-v').innerText = golsV;

            let isPenaltisDecididos = (jogoAtivo.penaltisMandante !== null && jogoAtivo.penaltisMandante !== undefined);

            document.getElementById('placar-penalti-m').innerText = isPenaltisDecididos ? penaltisM : '0';
            document.getElementById('placar-penalti-v').innerText = isPenaltisDecididos ? penaltisV : '0';

            const isFinalizado = jogoAtivo.status === 'Finalizado';
            renderizarLado(dados.elencoMandante, 'mandante', isFinalizado, jogoAtivo.mandanteId);
            renderizarLado(dados.elencoVisitante, 'visitante', isFinalizado, jogoAtivo.visitanteId);

            // Habilita o botão de gerar card ao carregar um jogo
            const btnCard = document.getElementById('btn-gerar-card');
            if (btnCard) btnCard.disabled = false;

            const wrapper = document.getElementById('penaltis-wrapper');
            const containerPen = document.getElementById('penaltis-container');
            const toggleContainer = document.getElementById('toggle-penaltis-container');
            const toggleCb = document.getElementById('toggle-penaltis');

            if (isFinalizado) {
                if (isPenaltisDecididos) {
                    wrapper.style.display = 'block';
                    toggleContainer.style.display = 'none'; // Esconde a chave, exibe só os valores
                    containerPen.style.display = 'block';
                } else {
                    wrapper.style.display = 'none';
                }
            } else {
                wrapper.style.display = 'block'; // Sempre mostrar o switch durante o andamento da súmula
                toggleContainer.style.display = 'flex';
                toggleCb.checked = isPenaltisDecididos;
                containerPen.style.display = isPenaltisDecididos ? 'block' : 'none';

                // Reinicia em 0 caso fossem null e o usuário ligar a flag depois
                penaltisM = penaltisM || 0;
                penaltisV = penaltisV || 0;
            }

            const btnFinalizar = document.getElementById('btn-finalizar');

            // Remove alerta e campo de motivo anteriores (se houver)
            const alertAnterior = document.getElementById('alerta-master');
            if (alertAnterior) alertAnterior.remove();
            const motivoAnterior = document.getElementById('motivo-master-wrapper');
            if (motivoAnterior) motivoAnterior.remove();

            if (isFinalizado && !isMaster) {
                // Usuário COMUM: bloqueia tudo
                btnFinalizar.disabled = true;
                btnFinalizar.innerHTML = '<i class="bi bi-lock-fill me-2"></i> JOGO FINALIZADO (SOMENTE LEITURA)';
                btnFinalizar.classList.replace('btn-success', 'btn-secondary');

                // Desabilita botões de penaltis
                document.getElementById('btn-penalti-sub-m').disabled = true;
                document.getElementById('btn-penalti-add-m').disabled = true;
                document.getElementById('btn-penalti-sub-v').disabled = true;
                document.getElementById('btn-penalti-add-v').disabled = true;
                document.getElementById('toggle-penaltis').disabled = true;

            } else if (isFinalizado && isMaster) {
                // Usuário MASTER: libera edição com aviso visual
                btnFinalizar.disabled = false;
                btnFinalizar.innerHTML = '<i class="bi bi-shield-lock-fill me-2"></i> CORRIGIR SÚMULA (MASTER)';
                btnFinalizar.classList.replace('btn-secondary', 'btn-warning');
                if (!btnFinalizar.classList.contains('btn-warning')) {
                    btnFinalizar.classList.remove('btn-success');
                    btnFinalizar.classList.add('btn-warning');
                }

                // Habilita botões de penaltis
                document.getElementById('btn-penalti-sub-m').disabled = false;
                document.getElementById('btn-penalti-add-m').disabled = false;
                document.getElementById('btn-penalti-sub-v').disabled = false;
                document.getElementById('btn-penalti-add-v').disabled = false;
                document.getElementById('toggle-penaltis').disabled = false;

                // Alerta de aviso MASTER
                const alerta = document.createElement('div');
                alerta.id = 'alerta-master';
                alerta.className = 'alert alert-warning d-flex align-items-center gap-2 mt-3 fw-bold';
                alerta.innerHTML = '<i class="bi bi-exclamation-triangle-fill fs-5"></i> Você está editando uma súmula já finalizada. Esta alteração será registrada no histórico.';
                btnFinalizar.insertAdjacentElement('afterend', alerta);

                // Campo de motivo
                const motivoWrapper = document.createElement('div');
                motivoWrapper.id = 'motivo-master-wrapper';
                motivoWrapper.className = 'mt-3';
                motivoWrapper.innerHTML = `
                    <label class="form-label fw-bold small text-muted"><i class="bi bi-journal-text me-1"></i> MOTIVO DA CORREÇÃO (OPCIONAL)</label>
                    <textarea id="input-motivo-master" class="form-control" rows="2" placeholder="Ex: Correção solicitada via ofício nº 123/2026..."></textarea>
                `;
                alerta.insertAdjacentElement('afterend', motivoWrapper);

            } else {
                // Jogo não finalizado: fluxo normal
                btnFinalizar.disabled = false;
                btnFinalizar.innerHTML = '<i class="bi bi-check2-circle me-2"></i> FINALIZAR E SALVAR RESULTADO';
                btnFinalizar.classList.remove('btn-warning');
                btnFinalizar.classList.replace('btn-secondary', 'btn-success');

                // Habilita botões de penaltis
                document.getElementById('btn-penalti-sub-m').disabled = false;
                document.getElementById('btn-penalti-add-m').disabled = false;
                document.getElementById('btn-penalti-sub-v').disabled = false;
                document.getElementById('btn-penalti-add-v').disabled = false;
                document.getElementById('toggle-penaltis').disabled = false;
            }
        }

        function togglePenaltisView() {
            const isChecked = document.getElementById('toggle-penaltis').checked;
            document.getElementById('penaltis-container').style.display = isChecked ? 'block' : 'none';
        }

        function renderizarLado(atletas, lado, bloqueado, equipeId) {
            const container = document.getElementById(`lista-${lado}`);
            container.innerHTML = '';
            if (atletas.length === 0) container.innerHTML = '<p class="p-3 text-muted small">Nenhum atleta vinculado.</p>';

            const attr = bloqueado ? 'disabled' : '';

            atletas.forEach(a => {
                container.innerHTML += `
                <div class="card-atleta p-3 row mx-0 align-items-center" data-atleta-id="${a.id}" data-equipe-id="${equipeId || ''}">
                    <div class="col-12 fw-bold text-truncate mb-2 px-0 fs-6">
                        ${a.nome}
                    </div>
                    <div class="col-12 px-0 d-flex flex-wrap gap-2 justify-content-start">
                        <div class="text-center">
                            <small class="d-block text-muted fw-bold mb-1" style="font-size: 0.65rem;">GOLS</small>
                            <div class="input-group input-group-sm flex-nowrap border rounded bg-white shadow-sm">
                                <button class="btn btn-outline-secondary px-2 border-0 bg-light" type="button" onclick="atualizar(this, -1, '${lado}', 'gol')" ${attr}>-</button>
                                <span class="input-group-text px-2 fw-bold val-display gol-count bg-white border-0" style="min-width: 30px; justify-content: center;">${a.gols || 0}</span>
                                <button class="btn btn-outline-secondary px-2 border-0 bg-light" type="button" onclick="atualizar(this, 1, '${lado}', 'gol')" ${attr}>+</button>
                            </div>
                        </div>
                        <div class="text-center">
                            <small class="d-block text-muted fw-bold mb-1" style="font-size: 0.65rem;">GC</small>
                            <div class="input-group input-group-sm flex-nowrap border border-info rounded bg-white shadow-sm">
                                <button class="btn btn-outline-info px-2 border-0 bg-light" type="button" onclick="atualizar(this, -1, '${lado}', 'gc')" ${attr}>-</button>
                                <span class="input-group-text px-2 fw-bold val-display gc-count bg-white text-info border-0" style="min-width: 30px; justify-content: center;">${a.gc || 0}</span>
                                <button class="btn btn-outline-info px-2 border-0 bg-light" type="button" onclick="atualizar(this, 1, '${lado}', 'gc')" ${attr}>+</button>
                            </div>
                        </div>
                        <div class="text-center">
                            <small class="d-block text-muted fw-bold mb-1" style="font-size: 0.65rem;">AM</small>
                            <div class="input-group input-group-sm flex-nowrap border border-warning rounded bg-white shadow-sm">
                                <button class="btn btn-outline-warning px-2 text-dark border-0 bg-light" type="button" onclick="atualizar(this, -1, '${lado}', 'am')" ${attr}>-</button>
                                <span class="input-group-text px-2 fw-bold val-display am-count bg-white text-warning border-0" style="min-width: 30px; justify-content: center;">${a.am || 0}</span>
                                <button class="btn btn-outline-warning px-2 text-dark border-0 bg-light" type="button" onclick="atualizar(this, 1, '${lado}', 'am')" ${attr}>+</button>
                            </div>
                        </div>
                        <div class="text-center">
                            <small class="d-block text-muted fw-bold mb-1" style="font-size: 0.65rem;">VM</small>
                            <div class="input-group input-group-sm flex-nowrap border border-danger rounded bg-white shadow-sm">
                                <button class="btn btn-outline-danger px-2 border-0 bg-light" type="button" onclick="atualizar(this, -1, '${lado}', 'vm')" ${attr}>-</button>
                                <span class="input-group-text px-2 fw-bold val-display vm-count bg-white text-danger border-0" style="min-width: 30px; justify-content: center;">${a.vm || 0}</span>
                                <button class="btn btn-outline-danger px-2 border-0 bg-light" type="button" onclick="atualizar(this, 1, '${lado}', 'vm')" ${attr}>+</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function atualizar(btn, valor, lado, tipo) {
            // Bloqueia apenas para COMUM em jogo finalizado
            if (jogoAtivo && jogoAtivo.status === 'Finalizado' && !isMaster) return;

            const display = btn.parentElement.querySelector('.val-display');
            let atual = parseInt(display.innerText);
            if (atual + valor < 0) return;
            display.innerText = atual + valor;

            if (tipo === 'gol') {
                if (lado === 'mandante') { golsM += valor; document.getElementById('placar-m').innerText = golsM; }
                else { golsV += valor; document.getElementById('placar-v').innerText = golsV; }
            }

            if (tipo === 'gc') {
                // Gol contra soma para o ADVERSÁRIO
                if (lado === 'mandante') { golsV += valor; document.getElementById('placar-v').innerText = golsV; }
                else { golsM += valor; document.getElementById('placar-m').innerText = golsM; }
            }
        }

        function atualizarPenalti(valor, lado) {
            // Bloqueia apenas para COMUM em jogo finalizado
            if (jogoAtivo && jogoAtivo.status === 'Finalizado' && !isMaster) return;

            if (lado === 'mandante') {
                if (penaltisM + valor < 0) return;
                penaltisM += valor;
                document.getElementById('placar-penalti-m').innerText = penaltisM;
            } else {
                if (penaltisV + valor < 0) return;
                penaltisV += valor;
                document.getElementById('placar-penalti-v').innerText = penaltisV;
            }
        }

        async function finalizarPartida() {
            // COMUM não pode salvar jogo finalizado; MASTER pode (correção)
            if (!jogoAtivo) return;
            if (jogoAtivo.status === 'Finalizado' && !isMaster) return;

            const btnFinalizar = document.getElementById('btn-finalizar');
            const textoOriginal = btnFinalizar.innerHTML;

            try {
                btnFinalizar.disabled = true;
                btnFinalizar.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> SALVANDO RESULTADO...';

                // Upload da Foto da Súmula se houver
                // Usa a URL existente se já houver, ou null se for novo
                let sumulaUrl = jogoAtivo.sumulaUrl || null;
                const fileInput = document.getElementById('input-foto-sumula');
                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);
                    formData.append('bucket', 'sumulas');

                    try {
                        const resUpload = await fetch(`${API}/upload`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                            body: formData
                        });
                        if (resUpload.ok) {
                            const dataUpload = await resUpload.json();
                            sumulaUrl = dataUpload.url;
                        }
                    } catch (e) { console.error("Erro upload súmula:", e); }
                }

                const estatisticas = [];
                document.querySelectorAll('.card-atleta').forEach(card => {
                    estatisticas.push({
                        atletaId: parseInt(card.dataset.atletaId),
                        equipeId: parseInt(card.dataset.equipeId) || null,
                        gols: parseInt(card.querySelector('.gol-count').innerText),
                        gc: parseInt(card.querySelector('.gc-count').innerText),
                        am: parseInt(card.querySelector('.am-count').innerText),
                        vm: parseInt(card.querySelector('.vm-count').innerText)
                    });
                });

                console.log("[FRONTEND] Enviando estatísticas:", estatisticas);

                let finalPenaltisM = null;
                let finalPenaltisV = null;
                const toggle = document.getElementById('toggle-penaltis');
                // Se não foi finalizado e a flag de penaltis estiver ligada
                if (toggle && toggle.checked) {
                    finalPenaltisM = penaltisM;
                    finalPenaltisV = penaltisV;
                }

                const motivo = document.getElementById('input-motivo-master')?.value || null;

                const envioData = {
                    jogoId: jogoAtivo.id,
                    golsM,
                    golsV,
                    estatisticas,
                    penaltisM: finalPenaltisM,
                    penaltisV: finalPenaltisV,
                    sumulaUrl,
                    motivo
                };

                const res = await fetch(`${API}/jogos/finalizar`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(envioData)
                });

                if (res.ok) {
                    showToast('Salvo com sucesso!', 'success');
                    setTimeout(() => {
                        const campId = document.getElementById('select-campeonato').value;
                        const rodadaId = document.getElementById('select-rodada').value;
                        if (campId) {
                            window.location.href = `jogos.html?campeonatoId=${campId}&rodadaId=${rodadaId || ''}`;
                        } else {
                            window.location.href = 'jogos.html';
                        }
                    }, 1500);
                } else {
                    const errInfo = await res.text();
                    console.error("Erro da API:", errInfo);
                    showToast('Erro ao salvar.', 'error');
                    btnFinalizar.disabled = false;
                    btnFinalizar.innerHTML = textoOriginal;
                }
            } catch (error) {
                console.error("Erro de conexão:", error);
                showToast('Erro ao salvar.', 'error');
                btnFinalizar.disabled = false;
                btnFinalizar.innerHTML = textoOriginal;
            }
        }

        // ============================================================
        // GERADOR DE CARD DE RESULTADO PARA INSTAGRAM (1080x1080)
        // ============================================================
        async function gerarCardResultado() {
            if (!jogoAtivo) {
                showToast('Selecione um jogo primeiro.', 'error');
                return;
            }

            const btn = document.getElementById('btn-gerar-card');
            const textoOriginal = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> GERANDO IMAGEM...';

            try {
                // --- Dados do jogo ---
                const nomeMandante = jogoAtivo.mandanteNome || 'MANDANTE';
                const nomeVisitante = jogoAtivo.visitanteNome || 'VISITANTE';
                const logoMandante = jogoAtivo.mandanteLogo || jogoAtivo.logoMandante || null;
                const logoVisitante = jogoAtivo.visitanteLogo || jogoAtivo.logoVisitante || null;
                const campeonato = document.getElementById('select-campeonato');
                const nomeCamp = campeonato.options[campeonato.selectedIndex]?.text || 'Campeonato';
                const rodada = document.getElementById('select-rodada');
                const nomeRodada = rodada.options[rodada.selectedIndex]?.text || '';

                // Formata a data do jogo
                let dataFormatada = '';
                if (jogoAtivo.data) {
                    const d = new Date(jogoAtivo.data);
                    dataFormatada = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
                }

                // Iniciais para fallback quando não há logo
                function getInitials(nome) {
                    return nome.split(' ').map(p => p[0]).join('').substring(0, 3).toUpperCase();
                }

                // Monta o bloco de logo ou iniciais
                function buildLogoHtml(url, nome) {
                    if (url) {
                        return `<img src="${url}" alt="${nome}" crossorigin="anonymous" onerror="this.parentElement.innerHTML='<span class=team-initials>${getInitials(nome)}</span>'">`;
                    }
                    return `<span class="team-initials">${getInitials(nome)}</span>`;
                }

                // Pênaltis
                let penaltisHtml = '';
                const temPenaltis = (jogoAtivo.penaltisMandante !== null && jogoAtivo.penaltisMandante !== undefined);
                if (temPenaltis) {
                    penaltisHtml = `<div style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.55);margin-top:6px;letter-spacing:1px;">Pên: ${jogoAtivo.penaltisMandante} × ${jogoAtivo.penaltisVisitante}</div>`;
                }

                // Meta info
                const metaParts = [nomeCamp];
                if (nomeRodada && nomeRodada !== 'Selecione a Rodada...') metaParts.push(nomeRodada);
                if (dataFormatada) metaParts.push(dataFormatada);

                // Preenche o template
                const tpl = document.getElementById('card-resultado-template');
                tpl.innerHTML = `
                    <div class="card-bg-glow"></div>
                    <div class="card-stripe-top"></div>
                    <div class="card-stripe-bot"></div>
                    <div class="card-content">
                        <div class="card-badge">⚽ Resultado Final</div>
                        <div class="card-teams">
                            <div class="card-team">
                                <div class="team-logo-wrap">${buildLogoHtml(logoMandante, nomeMandante)}</div>
                                <div class="team-name">${nomeMandante}</div>
                            </div>
                            <div class="card-vs-block">
                                <div style="display:flex;align-items:center;gap:12px;">
                                    <div class="card-score">${golsM}</div>
                                    <div class="card-score-sep">×</div>
                                    <div class="card-score">${golsV}</div>
                                </div>
                                ${penaltisHtml}
                                <div class="card-vs-label">placar</div>
                            </div>
                            <div class="card-team">
                                <div class="team-logo-wrap">${buildLogoHtml(logoVisitante, nomeVisitante)}</div>
                                <div class="team-name">${nomeVisitante}</div>
                            </div>
                        </div>
                        <div class="card-divider"></div>
                        <div class="card-meta">
                            ${metaParts.map((p, i) => i === 0 ? `<span>${p}</span>` : `<span class="dot"></span><span>${p}</span>`).join('')}
                        </div>
                    </div>
                    <div class="card-watermark">SÚMULA DIGITAL</div>
                `;

                // Aguarda carregamento das imagens dentro do template
                const imgs = tpl.querySelectorAll('img');
                if (imgs.length > 0) {
                    await Promise.all(Array.from(imgs).map(img => {
                        if (img.complete) return Promise.resolve();
                        return new Promise(res => {
                            img.onload = res;
                            img.onerror = res;
                        });
                    }));
                }

                // Pequeno delay para garantir renderização
                await new Promise(r => setTimeout(r, 150));

                // Renderiza com html2canvas
                const canvas = await html2canvas(tpl, {
                    width: 1080,
                    height: 1080,
                    scale: 1,
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: null,
                    logging: false
                });

                // Dispara download
                const link = document.createElement('a');
                const nomeArquivo = `card_${nomeMandante.replace(/\s+/g,'_')}_vs_${nomeVisitante.replace(/\s+/g,'_')}.png`;
                link.download = nomeArquivo;
                link.href = canvas.toDataURL('image/png');
                link.click();

                showToast('Card gerado com sucesso! 🎉', 'success');
            } catch (err) {
                console.error('[Gerar Card]', err);
                showToast('Erro ao gerar o card.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = textoOriginal;
            }
        }

        window.onload = init;
    </script>
</body>

</html>
