<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Súmula Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            background-color: #f8fafc;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .login-body {
            padding: 40px 30px;
        }

        .btn-primary {
            background-color: #1e3a8a;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #1e40af;
            transform: translateY(-2px);
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
            border-color: #1e3a8a;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: #1e3a8a;
            color: white;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 24px;
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>

<body>

    <div class="login-card mx-3">
        <div class="login-header">
            <div class="logo-icon shadow">
                <i class="bi bi-trophy-fill"></i>
            </div>
            <h4 class="fw-bold mb-0 text-dark">Súmula Digital</h4>
            <p class="text-muted small mb-0">Gestão Esportiva para Prefeituras</p>
        </div>

        <div class="login-body">
            <form>
                <div class="mb-3">
                    <label class="form-label fw-bold small text-secondary text-uppercase">E-mail ou Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i
                                class="bi bi-person"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" placeholder="Digite seu acesso">
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-bold small text-secondary text-uppercase">Senha</label>
                        <a href="#" class="text-decoration-none small fw-bold text-primary">Esqueceu?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i
                                class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3 shadow">
                    Acessar Painel <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>

                <div id="login-erro" class="alert alert-danger d-none align-items-center gap-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="login-erro-msg"></span>
                </div>

                <div class="text-center mt-3">
                    <button type="button" class="btn btn-outline-secondary w-100 py-2 fw-bold"
                        data-bs-toggle="modal" data-bs-target="#modalPortal">
                        <i class="bi bi-globe me-2"></i> Ver Portal Público
                    </button>
                    <p class="small text-muted mt-3 mb-0">Precisa de suporte? <a href="#"
                            class="text-primary fw-bold text-decoration-none">Clique aqui</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="frontend/js/main.js"></script>

    <script>

        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.querySelector('input[type="email"]').value;
            const senha = document.querySelector('input[type="password"]').value;
            const btn = e.target.querySelector('button');

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error || 'Erro ao entrar');
                }

                const data = await res.json();

                // Armazena token JWT separado
                localStorage.setItem('authToken', data.token);

                // Armazena dados da sessão (sem senha)
                localStorage.setItem('usuario', JSON.stringify({
                    id: data.id,
                    email: data.email,
                    role: data.role || 'COMUM',
                    prefeituraId: data.prefeituraId,
                    prefeituraNome: data.prefeituraNome,
                    prefeituraSlug: data.prefeituraSlug,
                    permissoes: data.permissoes || []
                }));

                // Redireciona para o painel adequado
                if (!data.prefeituraId) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }

            } catch (error) {
                const erroDiv = document.getElementById('login-erro');
                document.getElementById('login-erro-msg').textContent = error.message;
                erroDiv.classList.remove('d-none');
                erroDiv.classList.add('d-flex');
                btn.disabled = false;
                btn.innerHTML = 'Acessar Painel <i class="bi bi-box-arrow-in-right ms-2"></i>';
            }
        });

        // --- MODAL DO PORTAL PÚBLICO ---
        document.addEventListener('DOMContentLoaded', () => {
            const modalPortalEl = document.getElementById('modalPortal');
            if (!modalPortalEl) return;

            modalPortalEl.addEventListener('show.bs.modal', async () => {
                const select = document.getElementById('select-prefeituras-portal');
                const btnAcessar = document.getElementById('btn-acessar-portal');
                select.innerHTML = '<option value="">Carregando municípios...</option>';
                btnAcessar.disabled = true;

                try {
                    const res = await fetch(`${API}/prefeituras`);
                    if (!res.ok) throw new Error('Falha ao buscar.');
                    const prefeituras = await res.json();

                    if (!prefeituras.length) {
                        select.innerHTML = '<option value="">Nenhum município cadastrado.</option>';
                        return;
                    }

                    select.innerHTML = '<option value="">Selecione um município...</option>';
                    prefeituras
                        .filter(p => p.nome !== 'Administração' && p.nome !== 'Administração Central')
                        .forEach(p => {
                            const opt = document.createElement('option');
                            opt.value = p.slug;
                            opt.textContent = p.nome;
                            select.appendChild(opt);
                        });
                    btnAcessar.disabled = false;
                } catch (e) {
                    select.innerHTML = '<option value="">Erro ao carregar. Tente novamente.</option>';
                    console.error('[Portal Modal] Erro ao buscar prefeituras:', e);
                }
            });
        });

        function irParaPortal() {
            const slug = document.getElementById('select-prefeituras-portal').value;
            if (!slug) {
                alert('Por favor, selecione um município.');
                return;
            }
            window.location.href = `portal.html?slug=${encodeURIComponent(slug)}`;
        }

    </script>

    <!-- Modal de Seleção de Município — Portal Público -->
    <div class="modal fade" id="modalPortal" tabindex="-1" aria-labelledby="modalPortalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px; overflow: hidden; font-family: 'Inter', sans-serif;">
                <div class="modal-header text-white border-0" style="background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); padding: 1.5rem 1.75rem;">
                    <div class="d-flex align-items-center gap-3">
                        <div style="width:42px;height:42px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-globe fs-5"></i>
                        </div>
                        <div>
                            <h5 class="modal-title fw-bold mb-0" id="modalPortalLabel">Acessar Portal Público</h5>
                            <p class="mb-0 opacity-75" style="font-size:0.8rem;">Escolha o município para continuar</p>
                        </div>
                    </div>
                    <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted small mb-3">
                        <i class="bi bi-info-circle-fill text-primary me-1"></i>
                        Selecione abaixo o município cujos campeonatos e resultados você deseja consultar.
                    </p>
                    <label for="select-prefeituras-portal" class="form-label small fw-bold text-uppercase text-muted">Município</label>
                    <select id="select-prefeituras-portal" class="form-select form-select-lg mb-1"
                        style="border-radius:10px; border-color:#cbd5e1;" onchange="document.getElementById('btn-acessar-portal').disabled = !this.value;">
                        <option value="">Carregando municípios...</option>
                    </select>
                </div>
                <div class="modal-footer border-0 pt-0 px-4 pb-4 gap-2">
                    <button type="button" class="btn btn-outline-secondary fw-bold flex-fill" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg me-1"></i> Cancelar
                    </button>
                    <button type="button" id="btn-acessar-portal" class="btn fw-bold flex-fill text-white"
                        style="background: linear-gradient(135deg, #1e3a8a, #1e40af); border:none; border-radius:8px;"
                        onclick="irParaPortal()" disabled>
                        <i class="bi bi-arrow-right-circle-fill me-1"></i> Acessar Portal
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
