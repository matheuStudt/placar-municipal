<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar Municipal - Base de Atletas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="frontend/css/main.css">
</head>

<body data-bs-theme="light">

    <div class="main-content-overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar p-3 shadow">
        <div class="d-flex align-items-center mb-4 px-2">
            <i class="bi bi-trophy-fill me-2 fs-4 text-warning"></i>
            <span class="prefeitura-nome fs-5 fw-bold text-white">Placar Municipal</span>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item mb-2"><a href="index.html" class="nav-link p-2"><i class="bi bi-house-door me-2"></i>
                    Início</a></li>
            <li class="nav-item mb-2"><a href="campeonatos.html" class="nav-link p-2"><i class="bi bi-award me-2"></i>
                    Campeonatos</a></li>
            <li class="nav-item mb-2"><a href="equipes.html" class="nav-link p-2"><i
                        class="bi bi-shield-shaded me-2"></i> Equipes</a></li>
            <li class="nav-item mb-2"><a href="atletas.html" class="nav-link active p-2"><i
                        class="bi bi-people me-2"></i> Atletas</a></li>
            <li class="nav-item mb-2"><a href="jogos.html" class="nav-link p-2"><i class="bi bi-calendar3 me-2"></i>
                    Tabela de Jogos</a></li>
            <li class="nav-item mb-2"><a href="sumula.html" class="nav-link p-2"><i
                        class="bi bi-file-earmark-text me-2"></i> Súmula</a></li>
            <hr class="text-white-50">
            <li class="nav-item"><a href="login.html" class="nav-link p-2 text-danger-emphasis text-white"><i
                        class="bi bi-box-arrow-left me-2"></i> Sair</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-navbar shadow-sm rounded-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold" id="titulo-painel-header">Base de Atletas</h5>
            </div>
            <div class="d-flex align-items-center gap-2">
                <!-- Botão de tema removido -->
            </div>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Base Global de Atletas</h2>
            <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#modalAtleta"
                onclick="prepararNovo()">
                <i class="bi bi-person-plus me-2"></i> Cadastrar Novo Atleta
            </button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-muted small text-uppercase">
                        <tr>
                            <th class="px-4">ID</th>
                            <th>Nome Completo</th>
                            <th>CPF</th>
                            <th class="text-end px-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-atletas"></tbody>
                </table>
            </div>
        </div>
    </main>
    </div>
    </div>

    <div class="modal fade" id="modalAtleta" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="modalTitle">Cadastrar Atleta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        id="btn-fechar"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formAtleta">
                        <input type="hidden" id="atletaId">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">NOME DO ATLETA</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">CPF</label>
                            <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold">SALVAR NO SISTEMA</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="frontend/js/main.js"></script>
    <script>
        let prefeituraId = null;

        async function init() {
            const user = checkSession();
            if (!user) return;
            prefeituraId = user.prefeituraId;
            carregarAtletas();
        }

        async function carregarAtletas() {
            const res = await fetch(`${API}/atletas?prefeituraId=${prefeituraId}`);
            const atletas = await res.json();
            const body = document.getElementById('tabela-atletas');
            body.innerHTML = '';
            atletas.forEach(a => {
                body.innerHTML += `
                <tr>
                    <td class="px-4 text-muted">#${a.id}</td>
                    <td class="fw-bold">${a.nome}</td>
                    <td class="text-secondary small font-monospace">${a.cpf || '--'}</td>
                    <td class="text-end px-4">
                        <button class="btn btn-sm btn-outline-primary me-2" data-bs-toggle="modal" data-bs-target="#modalAtleta" onclick="editarAtleta(${a.id}, '${a.nome}', '${a.cpf}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="excluirAtleta(${a.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>`;
            });
        }

        // Função para Deletar Atleta
        async function excluirAtleta(id) {
            if (confirm("Deseja realmente excluir este atleta? Isso também o removerá de qualquer equipe.")) {
                const res = await fetch(`${API}/atletas/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    alert(data.error || "Erro ao excluir atleta.");
                } else {
                    carregarAtletas();
                }
            }
        }

        function prepararNovo() {
            document.getElementById('formAtleta').reset();
            document.getElementById('atletaId').value = '';
            document.getElementById('modalTitle').innerText = 'Cadastrar Atleta';
        }

        function editarAtleta(id, nome, cpf) {
            document.getElementById('atletaId').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('cpf').value = cpf || '';
            document.getElementById('modalTitle').innerText = 'Ajustar Cadastro';
        }

        document.getElementById('formAtleta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('atletaId').value;
            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                prefeituraId: prefeituraId
            };
            await fetch(id ? `${API}/atletas/${id}` : `${API}/atletas`, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            document.getElementById('btn-fechar').click();
            carregarAtletas();
        });

        window.onload = init;
    </script>
</body>

</html>
