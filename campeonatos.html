<body data-bs-theme="light">

    <main class="main-content">

                                <select id="r3_3" class="form-select form-select-sm" style="width: 140px"><option value="">3º</option><option value="VITORIAS">Vitórias</option><option value="SALDO_GOLS">Saldo</option><option value="GOLS_PRO">Gols Pró</option><option value="GOLS_SOFRIDOS">Gols Contra</option><option value="CARTAO_AMARELO">Menos Amarelos</option><option value="CARTAO_VERMELHO">Menos Vermelhos</option></select>

    <div class="modal fade" id="modalInscricao" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold">Equipes Inscritas</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="small text-muted mb-3">Campeonato: <strong id="nome-camp-inscricao">--</strong></p>
                    <form id="form-inscricao" class="mb-4">
                        <input type="hidden" id="inscricao-camp-id">
                        <div class="row g-2">
                            <div class="col-7">
                                <label class="form-label small fw-bold text-muted">EQUIPE</label>
                                <select id="select-equipes-inscricao" class="form-select" required></select>
                            </div>
                            <div class="col-5">
                                <label class="form-label small fw-bold text-muted">CHAVE (GRUPO)</label>
                                <input type="text" id="inscricao-chave" class="form-control" placeholder="Ex: Chave A">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-3 fw-bold">INSCREVER EQUIPE</button>
                    </form>
                    <h6 class="fw-bold small text-uppercase text-muted border-bottom pb-2">Lista de Participantes</h6>
                    <div id="lista-equipes-inscritas" class="list-group list-group-flush mt-2"></div>
                </div>
            </div>

    <div class="modal fade" id="modalRodadas" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold">Gerenciar Rodadas</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="small text-muted mb-3">Campeonato: <strong id="nome-camp-rodadas">--</strong></p>
                    <form id="form-rodada" class="mb-4">
                        <input type="hidden" id="rodada-camp-id">
                        <div class="row g-2 mb-2">
                            <div class="col-8">
                                <input type="text" id="nome-rodada" class="form-control"
                                    placeholder="Ex: 1ª Rodada, Semi-Final, Final" required>
                            </div>
                            <div class="col-4">
                                <select id="tipo-rodada" class="form-select" required>
                                    <option value="GRUPO">Fase de Grupos</option>
                                    <option value="MATA_MATA">Mata-Mata</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Adicionar Rodada</button>
                    </form>
                    <h6 class="fw-bold small text-uppercase text-muted border-bottom pb-2">Rodadas Criadas</h6>
                    <div id="lista-rodadas" class="list-group list-group-flush mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="frontend/js/main.js"></script>
    <script>
        let prefeituraId = null;

        async function init() {
            const user = checkSession();
            if (!user) return;
            prefeituraId = user.prefeituraId;
            if (!prefeituraId) {
                console.error("prefeituraId não encontrado no usuário logado");
                return;
            }
            carregarCampeonatos();
        }

        async function carregarCampeonatos() {
            try {
                const res = await fetch(`${API}/campeonatos?prefeituraId=${prefeituraId}`);
                const camps = await res.json();
                window.campsData = camps;
                const body = document.getElementById('tabela-campeonatos');
                body.innerHTML = '';

                camps.forEach(c => {
                    body.innerHTML += `
                    <tr>
                        <td class="px-4 text-muted">#${c.id}</td>
                        <td class="fw-bold">${c.nome}</td>
                        <td>${c.ano}</td>
                        <td><span class="badge bg-info-subtle text-info border border-info-subtle">${c.formato}</span></td>
                        <td class="text-end px-4">
                            <div class="btn-group shadow-sm">
                                <button class="btn btn-sm btn-outline-success" onclick="abrirModalInscricao(${c.id}, '${c.nome}')" title="Inscrições">
                                    <i class="bi bi-shield-plus"></i> Equipes
                                </button>
                                <button class="btn btn-sm btn-outline-dark" onclick="abrirModalRodadas(${c.id}, '${c.nome}')" title="Rodadas">
                                    <i class="bi bi-calendar-event"></i> Rodadas
                                </button>
                                <button class="btn btn-sm btn-outline-warning" onclick="gerarChaveamento(${c.id})" title="Gerar Chaveamento Automático">
                                    <i class="bi bi-diagram-3"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-primary" onclick="editarCamp(${c.id})" title="Editar Campeonato">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="excluirCamp(${c.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
                });
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        // --- FUNÇÕES DE INSCRIÇÃO ---
        async function abrirModalInscricao(id, nome) {
            document.getElementById('nome-camp-inscricao').innerText = nome;
            document.getElementById('inscricao-camp-id').value = id;

            // Carrega equipes no select
            const resEq = await fetch(`${API}/equipes?prefeituraId=${prefeituraId}`);
            const equipes = await resEq.json();
            const select = document.getElementById('select-equipes-inscricao');
            select.innerHTML = '<option value="">Escolha uma equipe...</option>';
            equipes.forEach(eq => select.innerHTML += `<option value="${eq.id}">${eq.nome}</option>`);

            atualizarListaInscritos(id);
            new bootstrap.Modal(document.getElementById('modalInscricao')).show();
        }

        async function atualizarListaInscritos(campId) {
            const res = await fetch(`${API}/campeonatos/${campId}/equipes`);
            const inscritos = await res.json();
            const lista = document.getElementById('lista-equipes-inscritas');

            if (!inscritos.length) {
                lista.innerHTML = '<p class="text-center text-muted small py-3">Vazio</p>';
                return;
            }

            // Agrupar por Chave
            const grupos = {};
            inscritos.forEach(eq => {
                const ch = eq.chave || 'Sem Chave';
                if (!grupos[ch]) grupos[ch] = [];
                grupos[ch].push(eq);
            });

            lista.innerHTML = '';
            Object.keys(grupos).sort().forEach(chave => {
                let htmlChave = `
                <div class="mb-4">
                    <h6 class="fw-bold small text-primary border-bottom pb-1 mb-2">
                        <i class="bi bi-grid-3x3-gap me-1"></i> ${chave.toUpperCase()}
                    </h6>
                    <div class="list-group list-group-flush shadow-sm rounded border">`;

                grupos[chave].forEach(eq => {
                    htmlChave += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div class="fw-bold small">${eq.nome}</div>
                        <span class="badge bg-success-subtle text-success border small" style="font-size: 0.7rem;">Inscrita</span>
                    </div>`;
                });

                htmlChave += `</div></div>`;
                lista.innerHTML += htmlChave;
            });
        }

        document.getElementById('form-inscricao').addEventListener('submit', async (e) => {
            e.preventDefault();
            const campId = document.getElementById('inscricao-camp-id').value;
            await fetch(`${API}/participacoes`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({
                    campeonatoId: campId,
                    equipeId: document.getElementById('select-equipes-inscricao').value,
                    chave: document.getElementById('inscricao-chave').value
                })
            });
            document.getElementById('form-inscricao').reset();
            document.getElementById('inscricao-camp-id').value = campId;
            atualizarListaInscritos(campId);
        });

        // --- FUNÇÕES DE RODADAS ---
        async function abrirModalRodadas(id, nome) {
            document.getElementById('nome-camp-rodadas').innerText = nome;
            document.getElementById('rodada-camp-id').value = id;
            atualizarListaRodadas(id);
            new bootstrap.Modal(document.getElementById('modalRodadas')).show();
        }

        async function atualizarListaRodadas(campId) {
            try {
                const res = await fetch(`${API}/campeonatos/${campId}/rodadas`);
                const rodadas = await res.json();
                const lista = document.getElementById('lista-rodadas');

                if (!Array.isArray(rodadas)) {
                    console.error("[ERRO API] rodadas não é array:", rodadas);
                    lista.innerHTML = '<p class="text-center text-danger small py-3">Erro ao carregar rodadas. Verifique o console.</p>';
                    return;
                }

                lista.innerHTML = rodadas.length ? '' : '<p class="text-center text-muted small py-3">Nenhuma rodada criada</p>';
                rodadas.forEach(r => {
                    const displayName = r.nome ? r.nome : `Rodada ${r.numero}`;
                    const badgeTipo = r.tipo === 'MATA_MATA'
                        ? '<span class="badge bg-warning-subtle text-warning border border-warning-subtle ms-2">Mata-Mata</span>'
                        : '<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle ms-2">Grupo</span>';

                    lista.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center px-0">
                        <div>
                            <span class="fw-bold text-uppercase small">${displayName}</span>
                            ${badgeTipo}
                        </div>
                        <button class="btn btn-sm text-danger" onclick="excluirRodada(${r.id}, ${campId})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>`;
                });
            } catch (e) {
                console.error("Erro ao carregar rodadas:", e);
                document.getElementById('lista-rodadas').innerHTML = '<p class="text-center text-danger small py-3">Erro de conexão</p>';
            }
        }

        document.getElementById('form-rodada').addEventListener('submit', async (e) => {
            e.preventDefault();
            const campId = document.getElementById('rodada-camp-id').value;
            const nome = document.getElementById('nome-rodada').value;
            const tipo = document.getElementById('tipo-rodada').value;

            try {
                const res = await fetch(`${API}/rodadas`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ campeonatoId: campId, nome, tipo })
                });

                if (!res.ok) {
                    const erroData = await res.json();
                    console.error("[ERRO POST] Falha ao criar rodada:", erroData);
                    showToast('Erro ao criar rodada. Verifique o console para mais detalhes.', 'danger');
                    return;
                }

                document.getElementById('nome-rodada').value = '';
                document.getElementById('tipo-rodada').value = 'GRUPO';
                atualizarListaRodadas(campId);
            } catch (err) {
                console.error("Erro de conexão ao criar rodada:", err);
                showToast('Erro de conexão.', 'danger');
            }
        });

        async function excluirRodada(id, campId) {
            if (confirm("Excluir esta rodada?")) {
                await fetch(`${API}/rodadas/${id}`, { method: 'DELETE' });
                atualizarListaRodadas(campId);
            }
        }

        async function gerarChaveamento(campId) {
            if (!confirm("Deseja gerar o chaveamento automático? Isso irá preencher os jogos de Mata-Mata com os classificados da Fase de Grupos.")) return;

            // Encontra o botão que disparou a ação e aplica o estado de carregamento
            const btn = document.querySelector(`button[onclick="gerarChaveamento(${campId})"]`);
            const originalHtml = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span> Gerando...';
            }

            try {
                const res = await fetch(`${API}/campeonatos/${campId}/gerar-chaveamento`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                const data = await res.json().catch(() => ({}));

                if (res.ok) {
                    showToast(`✅ Sucesso! ${data.jogosAtualizados ?? '?'} jogo(s) atualizado(s) com os times classificados.`, 'success');
                } else {
                    showToast(data.error || 'Erro ao gerar chaveamento.', 'danger');
                }
            } catch (e) {
                console.error("Erro ao gerar chaveamento", e);
                showToast('Erro de conexão ao tentar gerar o chaveamento.', 'danger');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                }
            }
        }

        // --- FUNÇÕES DE CADASTRO ---
        function prepararNovo() {
            document.getElementById('formCamp').reset();
            document.getElementById('campId').value = '';
            document.getElementById('classificadosPorChave').value = '4';
            const defaults = ["VITORIAS", "SALDO_GOLS", "GOLS_PRO", "GOLS_SOFRIDOS"];
            for(let i=1; i<=6; i++) {
                document.getElementById(`rg_${i}`).value = defaults[i-1] || "";
                document.getElementById(`r2_${i}`).value = defaults[i-1] || "";
                document.getElementById(`r3_${i}`).value = defaults[i-1] || "";
            }
            document.getElementById('modalTitle').innerText = 'Novo Campeonato';
        }

        function editarCamp(id) {
            const c = window.campsData.find(x => x.id === id);
            document.getElementById('campId').value = c.id;
            document.getElementById('nome').value = c.nome;
            document.getElementById('ano').value = c.ano;
            document.getElementById('formato').value = c.formato;
            document.getElementById('classificadosPorChave').value = c.classificadosPorChave || 4;

            const rg = c.regrasDesempateGeral || ["VITORIAS", "SALDO_GOLS", "GOLS_PRO", "GOLS_SOFRIDOS"];
            const r2 = c.regrasDesempate2Equipes || ["VITORIAS", "SALDO_GOLS", "GOLS_PRO", "GOLS_SOFRIDOS"];
            const r3 = c.regrasDesempate3MaisEquipes || ["VITORIAS", "SALDO_GOLS", "GOLS_PRO", "GOLS_SOFRIDOS"];
            for(let i=1; i<=6; i++) {
                document.getElementById(`rg_${i}`).value = rg[i-1] || "";
                document.getElementById(`r2_${i}`).value = r2[i-1] || "";
                document.getElementById(`r3_${i}`).value = r3[i-1] || "";
            }

            document.getElementById('modalTitle').innerText = 'Editar Campeonato';
            new bootstrap.Modal(document.getElementById('modalCamp')).show();
        }

        async function excluirCamp(id) {
            if (confirm("Deseja excluir este campeonato?")) {
                await fetch(`${API}/campeonatos/${id}`, { method: 'DELETE' });
                carregarCampeonatos();
            }
        }

        document.getElementById('formCamp').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('campId').value;
            const rg = [];
            const r2 = [];
            const r3 = [];
            for (let i = 1; i <= 6; i++) {
                let vg = document.getElementById(`rg_${i}`).value;
                if (vg) rg.push(vg);
                let v2 = document.getElementById(`r2_${i}`).value;
                if (v2) r2.push(v2);
                let v3 = document.getElementById(`r3_${i}`).value;
                if (v3) r3.push(v3);
            }
            const dados = {
                nome: document.getElementById('nome').value,
                ano: parseInt(document.getElementById('ano').value),
                formato: document.getElementById('formato').value,
                classificadosPorChave: parseInt(document.getElementById('classificadosPorChave').value),
                prefeituraId: prefeituraId,
                regrasDesempateGeral: rg.length ? rg : undefined,
                regrasDesempate2Equipes: r2.length ? r2 : undefined,
                regrasDesempate3MaisEquipes: r3.length ? r3 : undefined
            };
            await fetch(id ? `${API}/campeonatos/${id}` : `${API}/campeonatos`, {
                method: id ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(dados)
            });
            document.getElementById('btn-fechar').click();
            carregarCampeonatos();
        });

        window.onload = init;
    </script>
</body>
