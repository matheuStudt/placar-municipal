<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Placar Municipal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="frontend/css/main.css">
    <style>
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .color-preview {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }
    </style>
</head>

<body data-bs-theme="light">

    <div class="main-content-overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar p-3 shadow">
        <div class="d-flex align-items-center mb-4 px-2">
            <i class="bi bi-trophy-fill me-2 fs-4 text-warning"></i>
            <span class="prefeitura-nome fs-5 fw-bold text-white">Placar Municipal</span>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item mb-2"><a href="index.html" class="nav-link p-2"><i class="bi bi-house-door me-2"></i>
                    Início</a></li>
            <li class="nav-item mb-2"><a href="campeonatos.html" class="nav-link p-2"><i class="bi bi-award me-2"></i>
                    Campeonatos</a></li>
            <li class="nav-item mb-2"><a href="equipes.html" class="nav-link p-2"><i
                        class="bi bi-shield-shaded me-2"></i> Equipes</a></li>
            <li class="nav-item mb-2"><a href="atletas.html" class="nav-link p-2"><i class="bi bi-people me-2"></i>
                    Atletas</a></li>
            <li class="nav-item mb-2"><a href="jogos.html" class="nav-link p-2"><i class="bi bi-calendar3 me-2"></i>
                    Tabela de Jogos</a></li>
            <li class="nav-item mb-2"><a href="sumula.html" class="nav-link p-2"><i
                        class="bi bi-file-earmark-text me-2"></i> Súmula</a></li>
            <hr class="text-white-50">
            <li class="nav-item"><a href="login.html" class="nav-link p-2 text-danger-emphasis text-white"><i
                        class="bi bi-box-arrow-left me-2"></i> Sair</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-navbar shadow-sm rounded-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold" id="titulo-painel-header">Configurações do Sistema</h5>
            </div>
            <div class="d-flex align-items-center gap-2">
                <!-- Botão de tema removido -->
            </div>
        </header>

        <div class="container-fluid mb-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card p-4">
                        <h4 class="mb-4 fw-bold">Identidade da Prefeitura</h4>

                        <form id="form-config">
                            <div class="mb-3">
                                <label class="form-label">Nome da Prefeitura / Campeonato</label>
                                <input type="text" id="nomePrefeitura" class="form-control"
                                    placeholder="Ex: Prefeitura de Itajaí" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">URL do Logo</label>
                                <div class="input-group">
                                    <input type="url" id="logoUrl" class="form-control"
                                        placeholder="https://exemplo.com/logo.png">
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="previewLogo()">Testar</button>
                                </div>
                                <div class="mt-2 text-center" id="logo-preview-container" style="display:none;">
                                    <img id="logo-preview" src="" alt="Preview" style="max-height: 80px;"
                                        class="img-fluid rounded border p-2">
                                </div>
                            </div>

                            <hr class="my-4">
                            <h5 class="mb-3 fw-bold">Cores do Sistema</h5>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Cor Primária (Header, Botões)</label>
                                    <div class="d-flex align-items-center gap-3">
                                        <input type="color" id="corPrimaria" class="form-control form-control-color"
                                            value="#0d6efd">
                                        <span class="text-muted small" id="hex-primaria">#0d6efd</span>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Cor Secundária (Destaques)</label>
                                    <div class="d-flex align-items-center gap-3">
                                        <input type="color" id="corSecundaria" class="form-control form-control-color"
                                            value="#6c757d">
                                        <span class="text-muted small" id="hex-secundaria">#6c757d</span>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5 d-grid">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill">
                                    <i class="bi bi-check-circle me-2"></i>Salvar Alterações
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="frontend/js/main.js"></script>
        <script>
            //const API = 'http://localhost:3001/api';
            const API = 'https://placar-api-qvva.onrender.com/api'; // Novo
            let prefeituraId = null;

            async function init() {
                const user = checkSession();
                if (!user) return;
                prefeituraId = user.prefeituraId;
                carregarConfig();
            }

            window.onload = init;

            async function carregarConfig() {
                try {
                    const res = await fetch(`${API}/configuracao?prefeituraId=${prefeituraId}`);
                    const config = await res.json();

                    document.getElementById('nomePrefeitura').value = config.nome || '';
                    document.getElementById('logoUrl').value = config.logoUrl || '';
                    document.getElementById('corPrimaria').value = config.corPrimaria || '#0d6efd';
                    document.getElementById('corSecundaria').value = config.corSecundaria || '#6c757d';

                    updateHex();
                    if (config.logoUrl) previewLogo();
                } catch (e) { console.error(e); }
            }

            function updateHex() {
                document.getElementById('hex-primaria').textContent = document.getElementById('corPrimaria').value.toUpperCase();
                document.getElementById('hex-secundaria').textContent = document.getElementById('corSecundaria').value.toUpperCase();
            }

            document.querySelectorAll('input[type="color"]').forEach(input => {
                input.addEventListener('input', updateHex);
            });

            function previewLogo() {
                const url = document.getElementById('logoUrl').value;
                const container = document.getElementById('logo-preview-container');
                const img = document.getElementById('logo-preview');

                if (url) {
                    img.src = url;
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            }

            document.getElementById('form-config').addEventListener('submit', async (e) => {
                e.preventDefault();

                const data = {
                    id: prefeituraId,
                    nome: document.getElementById('nomePrefeitura').value,
                    logoUrl: document.getElementById('logoUrl').value,
                    corPrimaria: document.getElementById('corPrimaria').value,
                    corSecundaria: document.getElementById('corSecundaria').value
                };

                try {
                    const res = await fetch(`${API}/configuracao`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (res.ok) {
                        alert('Configurações salvas com sucesso!');
                        window.location.reload();
                    }
                } catch (e) { alert('Erro ao salvar'); }
            });
        </script>
</body>

</html>
