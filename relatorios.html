    <style>
        /* ══════════════════════════════════════════════════════
           RESET AGRESSIVO DE IMPRESSÃO / PDF
           ══════════════════════════════════════════════════════ */
        @media print {

            /* 1 ── Margem física da impressora (separada do padding do body) */
            @page {
                size: A4 portrait;
                margin: 1cm;
            }

            /* 2 ── Reset de altura e margens no html/body */
            html,
            body {
                height: auto !important;
                min-height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                /* Evita que scrollbar invisível ocupe espaço */
                overflow: visible !important;
                font-size: 12pt;
                background-color: #fff !important;
                color: #000 !important;
            }

            /* 3 ── Ocultar TODOS os elementos de UI com display:none
                     (opacity/visibility ainda ocupam espaço físico) */
            .sidebar,
            .top-navbar,
            .btn-print-hide,
            .main-content-overlay,
            .modal,
            .modal-backdrop,
            footer,
            nav,
            [data-bs-toggle],
            #menu-container {
                display: none !important;
            }

            /* 4 ── Área de conteúdo principal */
            .main-content {
                margin-left: 0 !important;
                width: 100% !important;
                padding: 0 !important;
                margin-bottom: 0 !important;
            }

            /* 5 ── Área de impressão (card do relatório) */
            .card {
                border: none !important;
                box-shadow: none !important;
                margin-bottom: 0 !important;
                padding-bottom: 0 !important;
            }

            /* 6 ── Anulação de quebra de página no ÚLTIMO elemento
                     Evita a folha em branco extra ao final */
            #print-area,
            #print-area>*:last-child,
            .print-container>*:last-child,
            #tabela-jogos-relatorio>tr:last-child,
            table:last-of-type,
            .table-responsive:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
                margin-bottom: 0 !important;
                padding-bottom: 0 !important;
            }

            /* 7 ── Linha separadora vazia entre grupos não deve inflacionar */
            tr[style*="height: 35px"] {
                height: 0 !important;
                line-height: 0 !important;
            }

            tr[style*="height: 35px"] td {
                height: 12pt !important;
                padding: 0 !important;
                border: none !important;
            }

            /* 8 ── Tipografia e tabelas */
            .card-header {
                background-color: #fff !important;
                color: #000 !important;
                border-bottom: 2px solid #000 !important;
            }

            #pdf-titulo-campeonato,
            #pdf-subtitulo-rodada {
                color: #000 !important;
                font-weight: bold !important;
            }

            table {
                width: 100% !important;
                border-collapse: collapse !important;
                color: #000 !important;
            }

            th,
            td {
                border: 1px solid #ccc !important;
                padding: 8px !important;
                text-align: center !important;
                color: #000 !important;
            }

            .text-muted,
            .text-secondary {
                color: #333 !important;
            }

            .bg-primary {
                background-color: #fff !important;
                color: #000 !important;
            }

            .bg-light {
                background-color: #f8f9fa !important;
            }

            .container,
            .print-container {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .badge-categoria-print {
                display: inline-block !important;
                font-size: 0.65rem !important;
                border: 1px solid #000 !important;
                border-radius: 99px !important;
                padding: 1px 6px !important;
                background: #eee !important;
                color: #000 !important;
            }
        }
    </style>

    <script>
        let prefeituraId = null;

        async function init() {
            const user = checkSession();
            if (!user) return;
            prefeituraId = user.prefeituraId;
            carregarCampeonatos();
            carregarConfiguracoes();
        }

        async function carregarConfiguracoes() {
            try {
                const res = await fetch(`${API}/configuracao?prefeituraId=${prefeituraId}`);
                if (res.ok) {
                    const config = await res.json();
                    if (config.nome) {
                        document.getElementById('pdf-nome-prefeitura').innerText = config.nome;
                    }
                    if (config.logoUrl) {
                        const img = document.getElementById('pdf-logo-prefeitura');
                        img.src = config.logoUrl;
                        img.style.display = 'inline-block';
                    }
                }
            } catch (e) {
                console.error("Erro configurações:", e);
            }
        }

        /* async function carregarCampeonatos() {

                 const camps = await res.json();

                 select.innerHTML = '<option value="">Selecione...</option>';
                 camps.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
             } catch (e) {

             }
         }*/

        async function carregarCampeonatos() {
            try {
                const res = await fetch(`${API}/campeonatos?prefeituraId=${prefeituraId}`);
                const camps = await res.json();
                const select = document.getElementById('select-campeonato');

                select.innerHTML = '<option value="">Selecione...</option>';

                // VERIFICAÇÃO DE SEGURANÇA AJUSTADA
                if (Array.isArray(camps)) {
                    camps.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                }
                // O NOSSO NOVO CENÁRIO: O backend mandou o limite junto, então a lista está em "camps.campeonatos"
                else if (camps && Array.isArray(camps.campeonatos)) {
                    camps.campeonatos.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                }
                else if (camps && Array.isArray(camps.data)) {
                    camps.data.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                }
                else {
                    console.error("A API não retornou uma lista válida de campeonatos. Resposta do servidor:", camps);
                    select.innerHTML = '<option value="">Erro ao carregar (Verifique o console)</option>';
                }

            } catch (e) {
                console.error("Erro campeonato:", e);
                document.getElementById('select-campeonato').innerHTML = '<option value="">Erro de conexão</option>';
            }
        }

        async function carregarRodadas() {
            const campId = document.getElementById('select-campeonato').value;
            const cbRodada = document.getElementById('select-rodada');
            cbRodada.innerHTML = '<option value="">Carregando...</option>';

            if (!campId) {
                cbRodada.innerHTML = '<option value="">Selecione um Campeonato Primeiro...</option>';
                document.getElementById('tabela-jogos-relatorio').innerHTML = '<tr><td colspan="6" class="text-center p-4">Selecione o campeonato para visualizar.</td></tr>';
                return;
            }

            try {
                const res = await fetch(`${API}/campeonatos/${campId}/rodadas`);
                if (!res.ok) throw new Error("Falha buscando rodadas.");
                const rodadas = await res.json();

                cbRodada.innerHTML = '<option value="todas">Todas as Rodadas</option>';
                rodadas.forEach(r => cbRodada.innerHTML += `<option value="${r.id}">${r.nome}</option>`);

                carregarJogos();
            } catch (e) {
                console.error(e);
                cbRodada.innerHTML = '<option value="">(Erro)</option>';
            }
        }

        async function carregarJogos() {
            const campId = document.getElementById('select-campeonato').value;
            const rodadaId = document.getElementById('select-rodada').value;
            const tbody = document.getElementById('tabela-jogos-relatorio');

            if (!campId) return;

            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4">Carregando...</td></tr>';

            try {
                let url = `${API}/jogos?campeonatoId=${campId}`;
                const res = await fetch(url);
                let jogos = await res.json();

                if (rodadaId && rodadaId !== 'todas') {
                    jogos = jogos.filter(j => String(j.rodadaId) === String(rodadaId));
                }

                // Ajustando Titulos do PDF
                const selCamp = document.getElementById('select-campeonato');
                const selRod = document.getElementById('select-rodada');
                document.getElementById('pdf-titulo-campeonato').innerText = selCamp.options[selCamp.selectedIndex].text;
                document.getElementById('pdf-subtitulo-rodada').innerText = selRod.options[selRod.selectedIndex].text;

                if (jogos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted p-4">Nenhum jogo encontrado para este filtro.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';

                // Agrupando por Rodada, Data e Local
                const grupos = {};
                jogos.forEach(j => {
                    const localStr = j.local || 'Local a Definir';
                    const dataStr = j.data ? new Date(j.data + 'T00:00:00').toLocaleDateString('pt-BR') : 'Data Indefinida';
                    const rodadaLabel = j.rodada?.nome || (j.rodada?.numero ? `Rodada ${j.rodada.numero}` : '');
                    const key = `${rodadaLabel}||${dataStr}||${localStr}`;
                    if (!grupos[key]) grupos[key] = [];
                    grupos[key].push(j);
                });

                let isPrimeiro = true;
                Object.keys(grupos).forEach(key => {
                    const [rodadaLabel, dataStr, localStr] = key.split('||');

                    if (!isPrimeiro) {
                        tbody.innerHTML += `
                            <tr style="border-style: hidden;">
                                <td colspan="6" style="height: 35px; border: none !important;"></td>
                            </tr>
                        `;
                    }
                    isPrimeiro = false;

                    // Título em destaque para o bloco
                    tbody.innerHTML += `
                        <tr>
                            <td colspan="6" class="text-center border-0 pt-3 pb-2" style="background-color: transparent !important;">
                                <h4 class="mb-0 fw-bold border-bottom border-dark pb-2">${rodadaLabel} | ${dataStr} | ${localStr}</h4>
                            </td>
                        </tr>
                    `;

                    // Sub-agrupamento por Chave
                    const subGrupos = {};
                    grupos[key].forEach(j => {
                        const ch = j.chave || '-';
                        if (!subGrupos[ch]) subGrupos[ch] = [];
                        subGrupos[ch].push(j);
                    });

                    Object.keys(subGrupos).forEach(chave => {
                        // Repetição Obrigatória do Cabeçalho
                        tbody.innerHTML += `
                            <tr class="table-light text-muted small text-uppercase" style="border-bottom: 2px solid #ccc;">
                                <th class="text-center" style="width: 8%">Jogo</th>
                                <th class="text-center" style="width: 12%">Hora</th>
                                <th class="text-end" style="width: 25%">Mandante</th>
                                <th class="text-center" style="width: 15%">Placar</th>
                                <th class="text-start" style="width: 25%">Visitante</th>
                                <th class="text-center" style="width: 15%">Chave</th>
                            </tr>
                        `;

                        // Linhas de Jogo
                        subGrupos[chave].forEach(j => {
                            const hr = j.horario || '--:--';
                            const gM = j.status === 'Finalizado' ? j.golsMandante : '&nbsp;&nbsp;';
                            const gV = j.status === 'Finalizado' ? j.golsVisitante : '&nbsp;&nbsp;';
                            const nJ = j.numero || '-';
                            const chDesc = j.chave || '-';
                            const catJogo = j.rodada?.campeonato?.categoria || null;
                            const catBadge = catJogo
                                ? `<span class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle badge-categoria-print" style="font-size:0.65rem;display:block;margin-top:2px;">${catJogo}</span>`
                                : '';

                            tbody.innerHTML += `
                                <tr>
                                    <td class="text-center text-muted fw-bold">#${nJ}</td>
                                    <td class="text-center fw-bold text-secondary">${hr}${catBadge}</td>
                                    <td class="text-end fw-bold text-dark">${j.mandanteNome}</td>
                                    <td class="text-center bg-light fw-bold fs-6">${gM} X ${gV}</td>
                                    <td class="text-start fw-bold text-dark">${j.visitanteNome}</td>
                                    <td class="text-center small fw-bold border-start">
                                        <span class="badge bg-secondary-subtle text-secondary px-2">${chDesc}</span>
                                    </td>
                                </tr>
                            `;
                        });
                    });
                });
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger p-4">Erro ao carregar jogos.</td></tr>';
            }
        }

        function gerarPDF() {
            const campId = document.getElementById('select-campeonato').value;
            if (!campId) {
                showToast('Por favor, selecione um campeonato para gerar o relatório.', 'warning');
                return;
            }
            window.print();
        }

        /* ═══════════════════════════════════════════════════════
           GERADOR DE CARD PARA INSTAGRAM (1080 × 1080 px)
           ═══════════════════════════════════════════════════════ */
        async function gerarCardRodada() {
            const campId = document.getElementById('select-campeonato').value;
            if (!campId) {
                showToast('Selecione um campeonato antes de gerar o card.', 'warning');
                return;
            }

            // Botão: estado de carregando
            const btn = document.getElementById('btn-card-instagram');
            const btnOriginal = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Gerando...';

            try {
                // ── 1. Dados dos selects ──────────────────────────────────
                const selCamp = document.getElementById('select-campeonato');
                const selRod  = document.getElementById('select-rodada');
                const nomeCampeonato = selCamp.options[selCamp.selectedIndex]?.text || 'Campeonato';
                const nomeRodada    = selRod.options[selRod.selectedIndex]?.text  || '';

                // ── 2. Coletar jogos da tabela já renderizada ─────────────
                const tbody = document.getElementById('tabela-jogos-relatorio');
                const linhas = Array.from(tbody.querySelectorAll('tr'));

                // Filtra apenas as linhas de jogo real (com 6 <td> e sem colspan=6 em th)
                const jogosData = [];
                linhas.forEach(tr => {
                    const tds = tr.querySelectorAll('td');
                    if (tds.length < 5) return;
                    // Linha de jogo: coluna 2=mandante, 3=placar, 4=visitante
                    const placarcell = tds[3]?.innerText?.trim() || '';
                    if (!placarcell.includes('X') && !placarcell.includes('x')) return;

                    const partes = placarcell.split(/X/i);
                    const gmText = partes[0]?.trim().replace(/\u00a0/g, '') || '';
                    const gvText = partes[1]?.trim().replace(/\u00a0/g, '') || '';

                    jogosData.push({
                        mandante : tds[2]?.innerText?.trim() || '—',
                        visitante: tds[4]?.innerText?.trim() || '—',
                        golsM    : gmText !== '' ? gmText : null,
                        golsV    : gvText !== '' ? gvText : null,
                        logoM    : null,
                        logoV    : null,
                    });
                });

                // ── 3. Tentar buscar logos via API de jogos ──────────────
                try {
                    const rodadaId = selRod.value;
                    let url = `${API}/jogos?campeonatoId=${campId}`;
                    const res = await fetch(url);
                    let apiJogos = await res.json();
                    if (rodadaId && rodadaId !== 'todas') {
                        apiJogos = apiJogos.filter(j => String(j.rodadaId) === String(rodadaId));
                    }
                    // Mapeia logos pelo nome do mandante/visitante
                    apiJogos.forEach(j => {
                        const found = jogosData.find(jd =>
                            jd.mandante === j.mandanteNome && jd.visitante === j.visitanteNome
                        );
                        if (found) {
                            found.logoM = j.mandanteLogo || j.mandante?.logoUrl || null;
                            found.logoV = j.visitanteLogo || j.visitante?.logoUrl || null;
                        }
                    });
                } catch (_) { /* logos não críticas */ }

                if (jogosData.length === 0) {
                    showToast('Nenhum jogo com resultado encontrado para gerar o card.', 'warning');
                    return;
                }

                // ── 4. Preencher configurações do header ──────────────────
                const nomePref  = document.getElementById('pdf-nome-prefeitura')?.innerText || '';
                const logoSrc   = document.getElementById('pdf-logo-prefeitura')?.src || '';
                const logoDsp   = document.getElementById('pdf-logo-prefeitura')?.style?.display;

                document.getElementById('card-nome-prefeitura').innerText  = nomePref;
                document.getElementById('card-nome-campeonato').innerText  = nomeCampeonato;
                document.getElementById('card-nome-rodada').innerText      = nomeRodada;

                const cardLogoPref = document.getElementById('card-logo-prefeitura');
                const cardFooterLogo = document.getElementById('card-footer-logo');
                if (logoSrc && logoDsp !== 'none') {
                    cardLogoPref.src           = logoSrc;
                    cardLogoPref.style.display  = 'inline-block';
                    cardFooterLogo.src          = logoSrc;
                    cardFooterLogo.style.display = 'inline-block';
                } else {
                    cardLogoPref.style.display  = 'none';
                    cardFooterLogo.style.display = 'none';
                }

                // ── 5. Montar lista de jogos no template ──────────────────
                const LIMITE_COLUNA_UNICA = 8;
                const duasColunas = jogosData.length > LIMITE_COLUNA_UNICA;
                const listaContainer = document.getElementById('card-lista-jogos');
                listaContainer.innerHTML = '';

                // Divide em coluna(s)
                const col1 = duasColunas ? jogosData.slice(0, Math.ceil(jogosData.length / 2)) : jogosData;
                const col2 = duasColunas ? jogosData.slice(Math.ceil(jogosData.length / 2))  : [];

                const criarColuna = (lista) => {
                    const col = document.createElement('div');
                    col.style.cssText = `
                        flex: 1;
                        display: flex;
                        flex-direction: column;
                        gap: 6px;
                        justify-content: center;
                    `;

                    lista.forEach(jogo => {
                        const fontSize = duasColunas
                            ? (lista.length > 8 ? '11px' : '13px')
                            : (jogosData.length > 6 ? '14px' : '16px');
                        const logoSize = duasColunas ? '28px' : '36px';

                        const FALLBACK = `
                            <svg width="${logoSize}" height="${logoSize}" viewBox="0 0 24 24" fill="#555" style="flex-shrink:0;">
                                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                            </svg>`;

                        const logoMHtml = jogo.logoM
                            ? `<img src="${jogo.logoM}" width="${logoSize}" height="${logoSize}" style="object-fit:contain; flex-shrink:0; border-radius:50%;" crossorigin="anonymous" onerror="this.outerHTML='${FALLBACK.replace(/"/g, "'")}'"/>`
                            : FALLBACK;

                        const logoVHtml = jogo.logoV
                            ? `<img src="${jogo.logoV}" width="${logoSize}" height="${logoSize}" style="object-fit:contain; flex-shrink:0; border-radius:50%;" crossorigin="anonymous" onerror="this.outerHTML='${FALLBACK.replace(/"/g, "'")}'"/>`
                            : FALLBACK;

                        const finalizado = jogo.golsM !== null && jogo.golsV !== null;
                        const placarHtml = finalizado
                            ? `<span style="color:#FFD700; font-weight:800; font-size:${duasColunas ? '18px' : '22px'}; letter-spacing:1px;">${jogo.golsM}</span>
                               <span style="color:#888; font-size:12px; margin:0 2px;">×</span>
                               <span style="color:#FFD700; font-weight:800; font-size:${duasColunas ? '18px' : '22px'}; letter-spacing:1px;">${jogo.golsV}</span>`
                            : `<span style="color:#555; font-size:14px; letter-spacing:2px;">vs</span>`;

                        const row = document.createElement('div');
                        row.style.cssText = `
                            display: flex;
                            align-items: center;
                            background: rgba(255,255,255,0.04);
                            border: 1px solid rgba(255,215,0,0.08);
                            border-radius: 10px;
                            padding: ${duasColunas ? '8px 12px' : '10px 16px'};
                            gap: 8px;
                            min-height: ${duasColunas ? '44px' : '52px'};
                        `;
                        row.innerHTML = `
                            ${logoMHtml}
                            <span style="flex:1; text-align:right; color:#e0e0e0; font-weight:600; font-size:${fontSize}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${jogo.mandante}</span>
                            <div style="display:flex; align-items:center; gap:4px; flex-shrink:0; min-width:${duasColunas ? '56px' : '72px'}; justify-content:center;
                                background:rgba(0,0,0,0.4); border-radius:8px; padding:4px 10px;">
                                ${placarHtml}
                            </div>
                            <span style="flex:1; text-align:left; color:#e0e0e0; font-weight:600; font-size:${fontSize}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${jogo.visitante}</span>
                            ${logoVHtml}
                        `;
                        col.appendChild(row);
                    });
                    return col;
                };

                listaContainer.appendChild(criarColuna(col1));
                if (duasColunas) {
                    // Divisória vertical
                    const sep = document.createElement('div');
                    sep.style.cssText = 'width:1px; background:rgba(255,215,0,0.15); align-self:stretch; margin:0 8px;';
                    listaContainer.appendChild(sep);
                    listaContainer.appendChild(criarColuna(col2));
                }

                // ── 6. Renderizar com html2canvas ─────────────────────────
                showToast('Renderizando imagem, aguarde...', 'info');

                const canvas = await html2canvas(document.getElementById('template-card-instagram'), {
                    useCORS      : true,
                    allowTaint   : false,
                    scale        : 1,
                    width        : 1080,
                    height       : 1080,
                    backgroundColor: '#121212',
                    logging      : false,
                });

                // ── 7. Download automático ────────────────────────────────
                const link = document.createElement('a');
                link.download = `resultados-rodada-${nomeRodada.replace(/\s+/g, '-').toLowerCase() || 'card'}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

                showToast('Card gerado e salvo com sucesso! 🎉', 'success');

            } catch (err) {
                console.error('Erro ao gerar card:', err);
                showToast('Erro ao gerar o card. Verifique o console.', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = btnOriginal;
            }
        }

        window.onload = init;
    </script>
</body>

</html>
