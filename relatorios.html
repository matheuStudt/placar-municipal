<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Súmula Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="frontend/css/main.css">
    <style>
        /* ══════════════════════════════════════════════════════
           RESET AGRESSIVO DE IMPRESSÃO / PDF
           ══════════════════════════════════════════════════════ */
        @media print {

            /* 1 ── Margem física da impressora (separada do padding do body) */
            @page {
                size: A4 portrait;
                margin: 1cm;
            }

            /* 2 ── Reset de altura e margens no html/body */
            html,
            body {
                height: auto !important;
                min-height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                /* Evita que scrollbar invisível ocupe espaço */
                overflow: visible !important;
                font-size: 12pt;
                background-color: #fff !important;
                color: #000 !important;
            }

            /* 3 ── Ocultar TODOS os elementos de UI com display:none
                     (opacity/visibility ainda ocupam espaço físico) */
            .sidebar,
            .top-navbar,
            .btn-print-hide,
            .main-content-overlay,
            .modal,
            .modal-backdrop,
            footer,
            nav,
            [data-bs-toggle],
            #menu-container {
                display: none !important;
            }

            /* 4 ── Área de conteúdo principal */
            .main-content {
                margin-left: 0 !important;
                width: 100% !important;
                padding: 0 !important;
                margin-bottom: 0 !important;
            }

            /* 5 ── Área de impressão (card do relatório) */
            .card {
                border: none !important;
                box-shadow: none !important;
                margin-bottom: 0 !important;
                padding-bottom: 0 !important;
            }

            /* 6 ── Anulação de quebra de página no ÚLTIMO elemento
                     Evita a folha em branco extra ao final */
            #print-area,
            #print-area>*:last-child,
            .print-container>*:last-child,
            #tabela-jogos-relatorio>tr:last-child,
            table:last-of-type,
            .table-responsive:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
                margin-bottom: 0 !important;
                padding-bottom: 0 !important;
            }

            /* 7 ── Linha separadora vazia entre grupos não deve inflacionar */
            tr[style*="height: 35px"] {
                height: 0 !important;
                line-height: 0 !important;
            }

            tr[style*="height: 35px"] td {
                height: 12pt !important;
                padding: 0 !important;
                border: none !important;
            }

            /* 8 ── Tipografia e tabelas */
            .card-header {
                background-color: #fff !important;
                color: #000 !important;
                border-bottom: 2px solid #000 !important;
            }

            #pdf-titulo-campeonato,
            #pdf-subtitulo-rodada {
                color: #000 !important;
                font-weight: bold !important;
            }

            table {
                width: 100% !important;
                border-collapse: collapse !important;
                color: #000 !important;
            }

            th,
            td {
                border: 1px solid #ccc !important;
                padding: 8px !important;
                text-align: center !important;
                color: #000 !important;
            }

            .text-muted,
            .text-secondary {
                color: #333 !important;
            }

            .bg-primary {
                background-color: #fff !important;
                color: #000 !important;
            }

            .bg-light {
                background-color: #f8f9fa !important;
            }

            .container,
            .print-container {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .badge-categoria-print {
                display: inline-block !important;
                font-size: 0.65rem !important;
                border: 1px solid #000 !important;
                border-radius: 99px !important;
                padding: 1px 6px !important;
                background: #eee !important;
                color: #000 !important;
            }
        }
    </style>
</head>

<body data-bs-theme="light">

    <div class="main-content-overlay" onclick="toggleSidebar()"></div>
    <div id="menu-container"></div>

    <main class="main-content print-container">
        <header class="top-navbar shadow-sm rounded-4 btn-print-hide">
            <div class="d-flex align-items-center gap-3">
                <button class="btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold" id="titulo-painel-header">Gerenciar Relatórios</h5>
            </div>
            <div class="d-flex align-items-center gap-2"></div>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4 btn-print-hide">
            <h2 class="fw-bold">Exportação de Relatórios</h2>
            <button class="btn btn-primary fw-bold shadow-sm" onclick="gerarPDF()">
                <i class="bi bi-file-earmark-pdf me-2"></i> Salvar como PDF
            </button>
        </div>

        <!-- Ferramentas de Filtro (Somente no Viewport) -->
        <div class="card shadow-sm border-0 mb-4 btn-print-hide">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">CAMPEONATO</label>
                        <select id="select-campeonato" class="form-select form-select-lg"
                            onchange="carregarRodadas()"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">RODADA</label>
                        <select id="select-rodada" class="form-select form-select-lg" onchange="carregarJogos()">
                            <option value="">Selecione um Campeonato Primeiro...</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabela (Mostrada no PDF também) -->
        <div class="card shadow-sm border-0" id="print-area">
            <div class="card-header bg-primary text-white d-none d-print-block text-center" style="padding: 1rem;">
                <!-- NOVO CABEÇALHO PREFEITURA -->
                <img id="pdf-logo-prefeitura" src="" alt="Logo da Prefeitura" style="max-height: 90px; display: none;"
                    class="img-fluid mb-2">
                <h4 class="fw-bold mb-3 text-uppercase" id="pdf-nome-prefeitura">PREFEITURA MUNICIPAL</h4>
                <hr class="border-dark opacity-50 mb-3" style="width: 50%; margin: 0 auto;">

                <h3 class="mb-0 fw-bold" id="pdf-titulo-campeonato">Tabela Oficial</h3>
                <p class="mb-0" id="pdf-subtitulo-rodada">Todos os Jogos</p>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <tbody id="tabela-jogos-relatorio">
                        <tr>
                            <td colspan="6" class="text-center text-muted p-4">Selecione o campeonato e a rodada para
                                exibir.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="frontend/js/main.js"></script>
    <script>
        let prefeituraId = null;

        async function init() {
            const user = checkSession();
            if (!user) return;
            prefeituraId = user.prefeituraId;
            carregarCampeonatos();
            carregarConfiguracoes();
        }

        async function carregarConfiguracoes() {
            try {
                const res = await fetch(`${API}/configuracao?prefeituraId=${prefeituraId}`);
                if (res.ok) {
                    const config = await res.json();
                    if (config.nome) {
                        document.getElementById('pdf-nome-prefeitura').innerText = config.nome;
                    }
                    if (config.logoUrl) {
                        const img = document.getElementById('pdf-logo-prefeitura');
                        img.src = config.logoUrl;
                        img.style.display = 'inline-block';
                    }
                }
            } catch (e) {
                console.error("Erro configurações:", e);
            }
        }

        /* async function carregarCampeonatos() {
             try {
                 const res = await fetch(`${API}/campeonatos?prefeituraId=${prefeituraId}`);
                 const camps = await res.json();
                 const select = document.getElementById('select-campeonato');
                 select.innerHTML = '<option value="">Selecione...</option>';
                 camps.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
             } catch (e) {
                 console.error("Erro campeonato:", e);
             }
         }*/

        async function carregarCampeonatos() {
            try {
                const res = await fetch(`${API}/campeonatos?prefeituraId=${prefeituraId}`);
                const camps = await res.json();
                const select = document.getElementById('select-campeonato');

                select.innerHTML = '<option value="">Selecione...</option>';

                // VERIFICAÇÃO DE SEGURANÇA AJUSTADA
                if (Array.isArray(camps)) {
                    camps.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                }
                // O NOSSO NOVO CENÁRIO: O backend mandou o limite junto, então a lista está em "camps.campeonatos"
                else if (camps && Array.isArray(camps.campeonatos)) {
                    camps.campeonatos.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                }
                else if (camps && Array.isArray(camps.data)) {
                    camps.data.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                }
                else {
                    console.error("A API não retornou uma lista válida de campeonatos. Resposta do servidor:", camps);
                    select.innerHTML = '<option value="">Erro ao carregar (Verifique o console)</option>';
                }

            } catch (e) {
                console.error("Erro campeonato:", e);
                document.getElementById('select-campeonato').innerHTML = '<option value="">Erro de conexão</option>';
            }
        }

        async function carregarRodadas() {
            const campId = document.getElementById('select-campeonato').value;
            const cbRodada = document.getElementById('select-rodada');
            cbRodada.innerHTML = '<option value="">Carregando...</option>';

            if (!campId) {
                cbRodada.innerHTML = '<option value="">Selecione um Campeonato Primeiro...</option>';
                document.getElementById('tabela-jogos-relatorio').innerHTML = '<tr><td colspan="6" class="text-center p-4">Selecione o campeonato para visualizar.</td></tr>';
                return;
            }

            try {
                const res = await fetch(`${API}/campeonatos/${campId}/rodadas`);
                if (!res.ok) throw new Error("Falha buscando rodadas.");
                const rodadas = await res.json();

                cbRodada.innerHTML = '<option value="todas">Todas as Rodadas</option>';
                rodadas.forEach(r => cbRodada.innerHTML += `<option value="${r.id}">${r.nome}</option>`);

                carregarJogos();
            } catch (e) {
                console.error(e);
                cbRodada.innerHTML = '<option value="">(Erro)</option>';
            }
        }

        async function carregarJogos() {
            const campId = document.getElementById('select-campeonato').value;
            const rodadaId = document.getElementById('select-rodada').value;
            const tbody = document.getElementById('tabela-jogos-relatorio');

            if (!campId) return;

            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4">Carregando...</td></tr>';

            try {
                let url = `${API}/jogos?campeonatoId=${campId}`;
                const res = await fetch(url);
                let jogos = await res.json();

                if (rodadaId && rodadaId !== 'todas') {
                    jogos = jogos.filter(j => String(j.rodadaId) === String(rodadaId));
                }

                // Ajustando Titulos do PDF
                const selCamp = document.getElementById('select-campeonato');
                const selRod = document.getElementById('select-rodada');
                document.getElementById('pdf-titulo-campeonato').innerText = selCamp.options[selCamp.selectedIndex].text;
                document.getElementById('pdf-subtitulo-rodada').innerText = selRod.options[selRod.selectedIndex].text;

                if (jogos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted p-4">Nenhum jogo encontrado para este filtro.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';

                // Agrupando por Rodada, Data e Local
                const grupos = {};
                jogos.forEach(j => {
                    const localStr = j.local || 'Local a Definir';
                    const dataStr = j.data ? new Date(j.data + 'T00:00:00').toLocaleDateString('pt-BR') : 'Data Indefinida';
                    const rodadaLabel = j.rodada?.nome || (j.rodada?.numero ? `Rodada ${j.rodada.numero}` : '');
                    const key = `${rodadaLabel}||${dataStr}||${localStr}`;
                    if (!grupos[key]) grupos[key] = [];
                    grupos[key].push(j);
                });

                let isPrimeiro = true;
                Object.keys(grupos).forEach(key => {
                    const [rodadaLabel, dataStr, localStr] = key.split('||');

                    if (!isPrimeiro) {
                        tbody.innerHTML += `
                            <tr style="border-style: hidden;">
                                <td colspan="6" style="height: 35px; border: none !important;"></td>
                            </tr>
                        `;
                    }
                    isPrimeiro = false;

                    // Título em destaque para o bloco
                    tbody.innerHTML += `
                        <tr>
                            <td colspan="6" class="text-center border-0 pt-3 pb-2" style="background-color: transparent !important;">
                                <h4 class="mb-0 fw-bold border-bottom border-dark pb-2">${rodadaLabel} | ${dataStr} | ${localStr}</h4>
                            </td>
                        </tr>
                    `;

                    // Sub-agrupamento por Chave
                    const subGrupos = {};
                    grupos[key].forEach(j => {
                        const ch = j.chave || '-';
                        if (!subGrupos[ch]) subGrupos[ch] = [];
                        subGrupos[ch].push(j);
                    });

                    Object.keys(subGrupos).forEach(chave => {
                        // Repetição Obrigatória do Cabeçalho
                        tbody.innerHTML += `
                            <tr class="table-light text-muted small text-uppercase" style="border-bottom: 2px solid #ccc;">
                                <th class="text-center" style="width: 8%">Jogo</th>
                                <th class="text-center" style="width: 12%">Hora</th>
                                <th class="text-end" style="width: 25%">Mandante</th>
                                <th class="text-center" style="width: 15%">Placar</th>
                                <th class="text-start" style="width: 25%">Visitante</th>
                                <th class="text-center" style="width: 15%">Chave</th>
                            </tr>
                        `;

                        // Linhas de Jogo
                        subGrupos[chave].forEach(j => {
                            const hr = j.horario || '--:--';
                            const gM = j.status === 'Finalizado' ? j.golsMandante : '&nbsp;&nbsp;';
                            const gV = j.status === 'Finalizado' ? j.golsVisitante : '&nbsp;&nbsp;';
                            const nJ = j.numero || '-';
                            const chDesc = j.chave || '-';
                            const catJogo = j.rodada?.campeonato?.categoria || null;
                            const catBadge = catJogo
                                ? `<span class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle badge-categoria-print" style="font-size:0.65rem;display:block;margin-top:2px;">${catJogo}</span>`
                                : '';

                            tbody.innerHTML += `
                                <tr>
                                    <td class="text-center text-muted fw-bold">#${nJ}</td>
                                    <td class="text-center fw-bold text-secondary">${hr}${catBadge}</td>
                                    <td class="text-end fw-bold text-dark">${j.mandanteNome}</td>
                                    <td class="text-center bg-light fw-bold fs-6">${gM} X ${gV}</td>
                                    <td class="text-start fw-bold text-dark">${j.visitanteNome}</td>
                                    <td class="text-center small fw-bold border-start">
                                        <span class="badge bg-secondary-subtle text-secondary px-2">${chDesc}</span>
                                    </td>
                                </tr>
                            `;
                        });
                    });
                });
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger p-4">Erro ao carregar jogos.</td></tr>';
            }
        }

        function gerarPDF() {
            const campId = document.getElementById('select-campeonato').value;
            if (!campId) {
                showToast('Por favor, selecione um campeonato para gerar o relatório.', 'warning');
                return;
            }
            window.print();
        }

        window.onload = init;
    </script>
</body>

</html>
