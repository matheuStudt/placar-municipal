<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Perfil da Equipe - Súmula Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="frontend/js/theme.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --gold: #fbbf24;
            --surface: #ffffff;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Botão Voltar */
        .btn-voltar {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            opacity: 1;
            transform: translateX(-5px);
            color: white;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: white;
            padding: 70px 0 90px;
            border-radius: 0 0 48px 48px;
            margin-bottom: -48px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -10%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.22) 0%, transparent 70%);
        }

        .hero .container {
            position: relative;
            z-index: 1;
        }

        .team-logo-hero {
            width: 110px;
            height: 110px;
            object-fit: contain;
            background: white;
            padding: 12px;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        /* Tabs */
        .nav-pills-custom {
            background: var(--bs-body-bg);
            border: 1px solid var(--bs-border-color-translucent);
            padding: 8px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: inline-flex;
        }

        .nav-pills-custom .nav-link {
            border-radius: 14px;
            padding: 10px 24px;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.2s;
        }

        .nav-pills-custom .nav-link.active {
            background-color: var(--accent) !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Content section */
        .section-content {
            padding-top: 80px;
            padding-bottom: 60px;
        }

        /* Elenco compacto */
        .elenco-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--bs-body-bg);
            border: 1px solid var(--bs-border-color);
            border-radius: 8px;
            transition: background 0.15s;
        }

        .elenco-item:hover {
            background: var(--bs-secondary-bg);
        }

        .elenco-avatar {
            width: 36px;
            height: 36px;
            background: #dbeafe;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .elenco-nome {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .elenco-nome:hover {
            color: var(--accent);
        }

        .elenco-tipo {
            font-size: 0.75rem;
            color: #64748b;
            margin-left: auto;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Game cards */
        .game-card-minimal {
            background: var(--bs-body-bg);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--bs-border-color-translucent);
            transition: all 0.2s;
        }

        .game-card-minimal:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.1);
        }

        .placar-inline {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Footer */
        footer {
            background: var(--primary);
            color: white;
            padding: 40px 0;
            margin-top: 80px;
        }
    </style>
</head>

<body>
    <!-- Hero -->
    <header class="hero">
        <div class="container text-center">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <a href="javascript:void(0)" onclick="voltarPaginaAnterior()" id="btn-voltar" class="btn-voltar mb-0">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
                <button id="btn-tema" class="btn btn-link text-white p-1 border-0" title="Alternar Tema" style="font-size:1.2rem; opacity:0.85;">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
            </div>
            <div id="hero-content">
                <div class="skeleton mx-auto mb-3" style="width: 110px; height: 110px; border-radius: 28px;"></div>
                <div class="skeleton mx-auto mb-2" style="width: 240px; height: 36px;"></div>
                <div class="skeleton mx-auto" style="width: 160px; height: 22px;"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container section-content">
            <!-- Back button (also inside content for mobile clarity) -->
            <div class="mb-4 d-flex justify-content-center">
                <div class="nav nav-pills nav-pills-custom" id="pills-tab" role="tablist">
                    <button class="nav-link active" id="pills-elenco-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-elenco" type="button" role="tab">
                        <i class="bi bi-people-fill me-1"></i>ELENCO
                    </button>
                    <button class="nav-link" id="pills-agenda-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-agenda" type="button" role="tab">
                        <i class="bi bi-calendar-event me-1"></i>AGENDA
                    </button>
                    <button class="nav-link" id="pills-resultados-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-resultados" type="button" role="tab">
                        <i class="bi bi-flag-fill me-1"></i>RESULTADOS
                    </button>
                </div>
            </div>

            <div class="tab-content" id="pills-tabContent">
                <!-- Elenco -->
                <div class="tab-pane fade show active" id="pills-elenco" role="tabpanel">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-header bg-body border-bottom py-3 px-4">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-people-fill text-primary me-2"></i>Elenco</h5>
                        </div>
                        <div id="container-elenco" class="row g-2 p-3">
                            <!-- Skeletons -->
                            <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="elenco-item"><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div class="skeleton flex-grow-1" style="height:18px;"></div></div></div>
                            <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="elenco-item"><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div class="skeleton flex-grow-1" style="height:18px;"></div></div></div>
                            <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="elenco-item"><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div class="skeleton flex-grow-1" style="height:18px;"></div></div></div>
                            <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="elenco-item"><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div class="skeleton flex-grow-1" style="height:18px;"></div></div></div>
                        </div>
                    </div>
                </div>

                <!-- Agenda -->
                <div class="tab-pane fade" id="pills-agenda" role="tabpanel">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-header bg-body border-bottom py-3 px-4">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-calendar-event text-primary me-2"></i>Próximos Jogos</h5>
                        </div>
                        <div class="card-body" id="container-agenda">
                            <p class="text-center text-muted py-4">Carregando...</p>
                        </div>
                    </div>
                </div>

                <!-- Resultados -->
                <div class="tab-pane fade" id="pills-resultados" role="tabpanel">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-header bg-body border-bottom py-3 px-4">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-flag-fill text-primary me-2"></i>Resultados</h5>
                        </div>
                        <div class="card-body" id="container-resultados">
                            <p class="text-center text-muted py-4">Carregando...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="text-white-50 small mb-0">&copy; 2026 Súmula Digital - Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="frontend/js/main.js?v=1.1"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const equipeId = urlParams.get('id');
        const slug = urlParams.get('slug') || urlParams.get('p') || 'principal';

        document.addEventListener('DOMContentLoaded', async () => {
            if (!equipeId) {
                window.location.href = 'portal.html';
                return;
            }

            // document.getElementById('btn-voltar').href = `portal.html?slug=${slug}`;

            await loadConfig();
            await loadEquipeDetails();
            await loadElenco();
            await loadJogos();
        });

        async function loadConfig() {
            try {
                const res = await fetch(`${API}/configuracao?slug=${slug}`);
                if (!res.ok) return;
                const config = await res.json();

                if (config.corPrimaria) {
                    const s = document.createElement('style');
                    s.innerHTML = `
                        :root { --accent: ${config.corPrimaria}; }
                        .hero { background: linear-gradient(135deg, ${config.corPrimaria} 0%, #0f172a 100%) !important; }
                        .nav-pills-custom .nav-link.active { background-color: ${config.corPrimaria} !important; }
                        .bg-primary { background-color: ${config.corPrimaria} !important; }
                        .text-primary { color: ${config.corPrimaria} !important; }
                    `;
                    document.head.appendChild(s);
                }
            } catch (e) { console.error(e); }
        }

        async function loadEquipeDetails() {
            try {
                const res = await fetch(`${API}/equipes/${equipeId}`);
                if (!res.ok) throw new Error();
                const eq = await res.json();

                document.title = `${eq.nome} - Súmula Digital`;

                const hero = document.getElementById('hero-content');
                let logoHtml = '';
                if (eq.logoUrl) {
                    logoHtml = `<img src="${eq.logoUrl}" class="team-logo-hero mb-4" alt="${eq.nome}">`;
                } else {
                    logoHtml = `<div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-10 rounded-4 mb-4 mx-auto" style="width:110px;height:110px;">
                        <i class="bi bi-shield-shaded fs-1 text-white opacity-75"></i>
                    </div>`;
                }

                hero.innerHTML = `
                    ${logoHtml}
                    <h1 class="display-5 fw-bold mb-2 text-white">${eq.nome.toUpperCase()}</h1>
                    <div class="d-flex justify-content-center gap-2 flex-wrap">
                        <span class="badge bg-white text-dark rounded-pill px-3 py-2 border shadow-sm fw-bold">
                            <i class="bi bi-tag-fill me-1 text-primary"></i> ${eq.categoria || 'Sem Categoria'}
                        </span>
                        ${eq.local ? `
                        <span class="badge bg-white text-dark rounded-pill px-3 py-2 border shadow-sm fw-bold">
                            <i class="bi bi-geo-alt-fill me-1 text-danger"></i> ${eq.local}
                        </span>` : ''}
                    </div>
                `;
            } catch (e) { console.error(e); }
        }

        async function loadElenco() {
            const container = document.getElementById('container-elenco');
            try {
                const res = await fetch(`${API}/equipes/${equipeId}/elenco`);
                const elenco = await res.json();

                if (elenco.length === 0) {
                    container.innerHTML = '<div class="elenco-item justify-content-center text-muted py-5"><i class="bi bi-person-x me-2"></i>Nenhum atleta cadastrado nesta equipe.</div>';
                    return;
                }

                container.innerHTML = elenco.map(at => `
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                        <div class="elenco-item h-100">
                            <div class="elenco-avatar">
                                <i class="bi bi-person-fill"></i>
                            </div>
                            <span class="elenco-nome text-truncate text-dark">
                                ${at.nome}
                            </span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div class="elenco-item text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Erro ao carregar elenco.</div>';
                console.error(e);
            }
        }

        async function loadJogos() {
            const agenda = document.getElementById('container-agenda');
            const resultados = document.getElementById('container-resultados');

            try {
                const res = await fetch(`${API}/jogos?equipeId=${equipeId}`);
                const jogos = await res.json();

                const futuras = jogos.filter(j => j.status === 'Agendado');
                const passadas = jogos.filter(j => j.status === 'Finalizado').reverse();

                const renderJogo = (j) => {
                    const isMandante = String(j.mandanteId) === String(equipeId);
                    const adversario = isMandante ? j.visitanteNome : j.mandanteNome;
                    const adversarioId = isMandante ? j.visitanteId : j.mandanteId;
                    const logoAdversario = isMandante ? (j.visitante?.logoUrl || '') : (j.mandante?.logoUrl || '');

                    const meuGol = isMandante ? j.golsMandante : j.golsVisitante;
                    const delGol = isMandante ? j.golsVisitante : j.golsMandante;
                    const venceu = meuGol > delGol;
                    const empatou = meuGol === delGol;

                    const dataFormatada = j.data ? j.data.split('-').reverse().join('/') : 'A definir';
                    const horarioFormatado = j.horario || '--:--';
                    const localFormatado = j.local || 'Local a definir';

                    return `
                        <a href="detalhes-jogo.html?jogoId=${j.id}&p=${slug}" class="game-card-minimal d-block text-decoration-none">
                            <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom text-muted small">
                                <div class="text-nowrap">
                                    <i class="bi bi-calendar-event me-1"></i>${dataFormatada} - ${horarioFormatado}
                                </div>
                                <div class="text-truncate text-end" style="max-width: 50%;">
                                    <i class="bi bi-geo-alt me-1"></i>${localFormatado}
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <div class="d-flex align-items-center gap-2 text-dark" style="max-width: 70%;">
                                    ${logoAdversario ? `<img src="${logoAdversario}" style="width:40px;height:40px;object-fit:contain;flex-shrink:0;">` : '<i class="bi bi-shield-shaded text-muted" style="font-size: 2.2rem; line-height: 40px; width: 40px; text-align: center;"></i>'}
                                    <div class="fw-bold text-wrap lh-sm">${adversario.toUpperCase()}</div>
                                </div>
                                ${j.status === 'Finalizado' ? `
                                <div class="text-end" style="max-width: 30%;">
                                    <div class="placar-inline ${venceu ? 'text-success' : (empatou ? 'text-secondary' : 'text-danger')}">
                                        ${meuGol} <span class="text-muted fw-light mx-1">:</span> ${delGol}
                                    </div>
                                    <div class="small fw-bold ${venceu ? 'text-success' : (empatou ? 'text-secondary' : 'text-danger')}">${venceu ? 'VITÓRIA' : (empatou ? 'EMPATE' : 'DERROTA')}</div>
                                </div>
                                ` : ''}
                            </div>
                        </a>
                    `;
                };

                agenda.innerHTML = futuras.length > 0
                    ? futuras.map(renderJogo).join('')
                    : '<p class="text-center py-4 text-muted"><i class="bi bi-calendar-x me-2"></i>Nenhum jogo agendado.</p>';

                resultados.innerHTML = passadas.length > 0
                    ? passadas.map(renderJogo).join('')
                    : '<p class="text-center py-4 text-muted"><i class="bi bi-flag me-2"></i>Nenhum resultado registrado.</p>';

            } catch (e) { console.error(e); }
        }
    </script>
</body>

</html>
