<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipes - Súmula Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="frontend/css/main.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>

<body data-bs-theme="light">

    <div class="main-content-overlay" onclick="toggleSidebar()"></div>
    <div id="menu-container"></div>

    <main class="main-content">
        <header class="top-navbar shadow-sm rounded-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold" id="titulo-painel-header">Gerenciar Equipes</h5>
            </div>
            <div class="d-flex align-items-center gap-2">
                <!-- Botão de tema removido -->
            </div>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Gerenciar Equipes</h2>
            <button class="btn btn-primary fw-bold shadow-sm" onclick="novaEquipe()">
                <i class="bi bi-plus-circle me-2"></i> Nova Equipe
            </button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted small text-uppercase">
                        <tr>
                            <th class="px-3">Logo</th>
                            <th>Equipe</th>
                            <th>Categoria</th>
                            <th>Responsável</th>
                            <th>Contato</th>
                            <th>Local de Mando/Sede</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-equipes">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    </div>
    </div>

    <div class="modal fade" id="modalEquipe" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Cadastrar Equipe</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-equipe">
                        <input type="hidden" id="equipe-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">NOME DA EQUIPE</label>
                            <input type="text" id="nome" class="form-control form-control-lg"
                                placeholder="Ex: Vila Nova F.C." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">RESPONSÁVEL / TÉCNICO</label>
                            <input type="text" id="responsavel" class="form-control form-control-lg"
                                placeholder="Nome do responsável" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">WHATSAPP</label>
                            <input type="text" id="telefone" class="form-control form-control-lg"
                                placeholder="(00) 00000-0000" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">LOCAL DE MANDO / SEDE</label>
                            <input type="text" id="local" class="form-control form-control-lg"
                                placeholder="Ex: Estádio Municipal ou Ginásio da Vila">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">LOGO / BRASÃO (<span
                                    class="text-primary">opcional</span>)</label>
                            <input type="file" id="logoFile" class="form-control form-control-lg" accept="image/*"
                                onchange="previewImagemUpload(this)">
                            <input type="hidden" id="logoUrl">
                            <div class="mt-2 text-center" id="logo-preview-container" style="display:none;">
                                <img id="logo-preview" src="" alt="Preview" style="max-height:60px; border-radius:8px;">
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <label class="form-label small fw-bold text-muted">CATEGORIA</label>
                                <button type="button"
                                    class="btn btn-link btn-sm text-primary p-0 text-decoration-none fw-bold"
                                    onclick="abrirModalCategorias()">
                                    <i class="bi bi-gear-fill me-1"></i> Gerenciar
                                </button>
                            </div>
                            <select id="categoria" class="form-select form-select-lg">
                                <option value="">Sem categoria específica</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold mt-2">SALVAR EQUIPE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalElenco" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Elenco: <span id="nome-equipe-modal" class="text-warning">--</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="bg-light p-3 rounded mb-4 border shadow-sm">
                        <h6 class="fw-bold mb-3 small">VINCULAR ATLETAS</h6>
                        <input type="hidden" id="equipe-id-vinculo">
                        <div class="row g-2 mb-2">
                            <div class="col-md-12">
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i
                                            class="bi bi-search text-muted"></i></span>
                                    <input type="text" id="busca-atletas-vinculo" class="form-control"
                                        placeholder="Buscar atleta por nome..." oninput="filtrarListaVinculo()">
                                </div>
                            </div>
                        </div>
                        <!-- Lista de checkboxes -->
                        <div id="lista-atletas-check"
                            style="max-height:220px;overflow-y:auto;border:1px solid #dee2e6;border-radius:8px;background:#fff;">
                            <div class="p-3">
                                <div class="skeleton mb-2" style="height:20px; border-radius:4px;"></div>
                                <div class="skeleton" style="height:20px; border-radius:4px; width:70%;"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <small class="text-muted" id="contador-selecionados">0 selecionados</small>
                            <button type="button" class="btn btn-primary btn-sm fw-bold px-4"
                                onclick="adicionarSelecionados()">
                                <i class="bi bi-person-plus me-1"></i> Adicionar Selecionados
                            </button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center px-1 mb-3">
                        <h6 class="fw-bold mb-0">Atletas Inscritos</h6>
                        <button class="btn btn-sm btn-danger fw-bold shadow-sm" onclick="limparElencoDaEquipe()"><i
                                class="bi bi-trash3 me-1"></i>Limpar Elenco</button>
                    </div>
                    <div class="list-group list-group-flush border rounded shadow-sm" id="lista-elenco">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Gerenciar Categorias -->
    <div class="modal fade" id="modalCategorias" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold">Gerenciar Categorias</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-nova-categoria" class="mb-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Nova Categoria</label>
                        <div class="input-group">
                            <input type="text" id="novo-nome-categoria" class="form-control"
                                placeholder="Ex: Sub-13, Amador..." required>
                            <button type="submit" class="btn btn-primary">ADICIONAR</button>
                        </div>
                    </form>

                    <h6 class="fw-bold mb-3 text-muted text-uppercase small">Categorias Cadastradas</h6>
                    <div id="lista-categorias" class="list-group list-group-flush border rounded-3 overflow-hidden">
                        <!-- Carregado via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="frontend/js/main.js"></script>
    <script>

        let prefeituraId = null;
        let modalEquipeBS = null;
        let modalCategoriasBS = null;

        async function init() {
            const user = checkSession();
            if (!user) return;
            prefeituraId = user.prefeituraId;
            modalEquipeBS = new bootstrap.Modal(document.getElementById('modalEquipe'));
            modalCategoriasBS = new bootstrap.Modal(document.getElementById('modalCategorias'));
            await carregarCategorias();
            carregarEquipes();
        }

        async function carregarCategorias() {
            try {
                const res = await fetch(`${API}/categorias?prefeituraId=${prefeituraId}`);
                const categorias = await res.json();

                const select = document.getElementById('categoria');
                const valorAtual = select.value;

                select.innerHTML = '<option value="">Sem categoria específica</option>';
                categorias.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.nome;
                    opt.textContent = cat.nome;
                    select.appendChild(opt);
                });

                // Mantém o valor selecionado se ele ainda existir
                select.value = valorAtual;

                // Também atualiza a lista no modal de gerenciamento
                const lista = document.getElementById('lista-categorias');
                if (categorias.length === 0) {
                    lista.innerHTML = '<div class="list-group-item text-center text-muted py-3">Nenhuma categoria cadastrada</div>';
                } else {
                    lista.innerHTML = categorias.map(cat => `
                        <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <span class="fw-bold text-uppercase small">${cat.nome}</span>
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="excluirCategoria(${cat.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error("Erro ao carregar categorias:", e);
            }
        }

        function abrirModalCategorias() {
            modalCategoriasBS.show();
        }

        document.getElementById('form-nova-categoria').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('novo-nome-categoria').value.trim();
            if (!nome) return;

            try {
                const res = await fetch(`${API}/categorias`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, prefeituraId })
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert(err.error || "Erro ao salvar categoria");
                    return;
                }

                document.getElementById('novo-nome-categoria').value = '';
                await carregarCategorias();
            } catch (e) {
                alert("Erro de conexão");
            }
        });

        async function excluirCategoria(id) {
            if (!confirm("Tem certeza que deseja excluir esta categoria? Equipes já cadastradas com este nome não serão afetadas, mas a opção não aparecerá mais no seletor.")) return;

            try {
                const res = await fetch(`${API}/categorias/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error();
                await carregarCategorias();
            } catch (e) {
                alert("Erro ao excluir categoria");
            }
        }

        async function carregarEquipes() {
            const tabela = document.getElementById('tabela-equipes');
            tabela.innerHTML = Array(5).fill('<tr><td colspan="6"><div class="skeleton" style="height: 38px; border-radius: 4px; opacity:0.5;"></div></td></tr>').join('');
            try {

                const res = await fetch(`${API}/equipes?prefeituraId=${prefeituraId}`);
                const equipes = await res.json();
                // Adicione esta linha para ordenar de A a Z
                equipes.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));
                tabela.innerHTML = '';

                equipes.forEach(eq => {
                    const foneLimpo = eq.telefone ? eq.telefone.replace(/\D/g, '') : '';
                    tabela.innerHTML += `
                    <tr>
                        <td class="px-3">
                            ${eq.logoUrl
                            ? `<img src="${eq.logoUrl}" alt="${eq.nome}" style="width:36px;height:36px;object-fit:contain;border-radius:6px;">`
                            : `<div style="width:36px;height:36px;background:#f1f5f9;border-radius:6px;display:flex;align-items:center;justify-content:center;"><i class="bi bi-shield text-muted"></i></div>`
                        }
                        </td>                        
                        <td class="fw-bold text-dark">${eq.nome}</td>
                        <td>${eq.categoria ? `<span class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle">${eq.categoria}</span>` : '<span class="text-muted small">-</span>'}</td>
                        <td>${eq.responsavel}</td>
                        <td>
                            <a href="https://wa.me/55${foneLimpo}" target="_blank" class="whatsapp-link">
                                <i class="bi bi-whatsapp me-1"></i>${eq.telefone}
                            </a>
                        </td>
                        <td class="text-muted small">${eq.local || 'Não informado'}</td>
                        <td class="text-center">
                            <div class="btn-group shadow-sm">
                                <button class="btn btn-sm btn-outline-secondary" title="Editar" onclick='editarEquipe(${JSON.stringify(eq)})'>
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-dark" title="Gerenciar Elenco" onclick="abrirModalElenco(${eq.id}, '${eq.nome}')">
                                    <i class="bi bi-people-fill"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" title="Excluir" onclick="excluirEquipe(${eq.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
                });
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        function novaEquipe() {
            document.getElementById('form-equipe').reset();
            document.getElementById('equipe-id').value = '';
            document.getElementById('modalTitulo').innerText = "Cadastrar Nova Equipe";
            modalEquipeBS.show();
        }

        function previewImagemUpload(input) {
            const container = document.getElementById('logo-preview-container');
            const img = document.getElementById('logo-preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    img.src = e.target.result;
                    container.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                if (!document.getElementById('logoUrl').value) {
                    container.style.display = 'none';
                } else {
                    img.src = document.getElementById('logoUrl').value;
                    container.style.display = 'block';
                }
            }
        }

        function editarEquipe(eq) {
            document.getElementById('equipe-id').value = eq.id;
            document.getElementById('nome').value = eq.nome;
            document.getElementById('responsavel').value = eq.responsavel;
            document.getElementById('telefone').value = eq.telefone;
            document.getElementById('local').value = eq.local || '';
            document.getElementById('categoria').value = eq.categoria || '';
            document.getElementById('logoFile').value = '';
            const logoInput = document.getElementById('logoUrl');
            logoInput.value = eq.logoUrl || '';
            const prev = document.getElementById('logo-preview');
            const prevContainer = document.getElementById('logo-preview-container');
            if (eq.logoUrl) {
                prev.src = eq.logoUrl;
                prevContainer.style.display = 'block';
            } else {
                prevContainer.style.display = 'none';
            }
            document.getElementById('modalTitulo').innerText = "Alterar Equipe";
            modalEquipeBS.show();
        }

        async function excluirEquipe(id) {
            if (confirm("Deseja realmente excluir esta equipe? Isso removerá todos os vínculos com atletas.")) {

                const res = await fetch(`${API}/equipes/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showToast(data.error || 'Erro ao excluir equipe.', 'danger');
                } else {
                    carregarEquipes();
                }
            }
        }

        document.getElementById('form-equipe').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btnSubmit = e.target.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
            btnSubmit.disabled = true;

            try {
                let logoFinalUrl = document.getElementById('logoUrl').value || null;
                const logoFile = document.getElementById('logoFile').files[0];

                if (logoFile) {
                    const formData = new FormData();
                    formData.append('file', logoFile);

                    const resUpload = await fetch(`${API}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    if (resUpload.ok) {
                        const uploadData = await resUpload.json();
                        logoFinalUrl = uploadData.url;
                    } else {
                        showToast('Erro ao fazer upload da imagem.', 'warning');
                    }
                }

                const id = document.getElementById('equipe-id').value;
                const dados = {
                    nome: document.getElementById('nome').value,
                    responsavel: document.getElementById('responsavel').value,
                    telefone: document.getElementById('telefone').value,
                    local: document.getElementById('local').value,
                    categoria: document.getElementById('categoria').value || null,
                    logoUrl: logoFinalUrl,
                    prefeituraId: prefeituraId
                };

                const url = id ? `${API}/equipes/${id}` : `${API}/equipes`;
                const method = id ? 'PUT' : 'POST';

                await fetch(url, {
                    method: method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(dados)
                });

                modalEquipeBS.hide();
                carregarEquipes();
            } catch (err) {
                console.error(err);
                showToast('Erro inesperado', 'danger');
            } finally {
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
            }
        });

        // --- FUNÇÕES DE ELENCO ---
        let atletasParaVincular = [];

        async function abrirModalElenco(id, nome) {
            document.getElementById('nome-equipe-modal').innerText = nome;
            document.getElementById('equipe-id-vinculo').value = id;
            document.getElementById('busca-atletas-vinculo').value = '';

            const resAtletas = await fetch(`${API}/atletas?prefeituraId=${prefeituraId}`);
            atletasParaVincular = await resAtletas.json();
            atletasParaVincular.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));

            filtrarListaVinculo();
            atualizarListaElenco(id);
            new bootstrap.Modal(document.getElementById('modalElenco')).show();
        }

        function filtrarListaVinculo() {
            const termo = document.getElementById('busca-atletas-vinculo').value.toLowerCase();
            const filtrados = atletasParaVincular.filter(a => a.nome.toLowerCase().includes(termo));
            const container = document.getElementById('lista-atletas-check');

            if (filtrados.length === 0) {
                container.innerHTML = '<div class="p-3 text-muted text-center small">Nenhum atleta encontrado.</div>';
                atualizarContadorSelecionados();
                return;
            }

            container.innerHTML = filtrados.map(a => `
                <label class="d-flex align-items-center gap-2 px-3 py-2 border-bottom"
                    style="cursor:pointer;" onmouseenter="this.style.background='#f8fafc'" onmouseleave="this.style.background=''">
                    <input type="checkbox" class="form-check-input check-atleta mt-0 flex-shrink-0"
                        value="${a.id}" onchange="atualizarContadorSelecionados()">
                    <span class="fw-semibold">${a.nome}</span>
                </label>
            `).join('');

            atualizarContadorSelecionados();
        }

        function atualizarContadorSelecionados() {
            const total = document.querySelectorAll('.check-atleta:checked').length;
            const el = document.getElementById('contador-selecionados');
            el.textContent = total === 0 ? '0 selecionados' : `${total} atleta${total > 1 ? 's' : ''} selecionado${total > 1 ? 's' : ''}`;
            el.className = total > 0 ? 'text-primary fw-bold small' : 'text-muted small';
        }

        async function adicionarSelecionados() {
            const equipeId = document.getElementById('equipe-id-vinculo').value;
            const tipo = 'Atleta';
            const selecionados = [...document.querySelectorAll('.check-atleta:checked')].map(c => c.value);

            if (selecionados.length === 0) {
                showToast('Selecione pelo menos um atleta.', 'warning');
                return;
            }

            const resultados = await Promise.all(selecionados.map(atletaId =>
                fetch(`${API}/vinculos`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ atletaId, equipeId, tipo })
                }).then(async r => ({ ok: r.ok, status: r.status }))
            ));

            const adicionados = resultados.filter(r => r.ok).length;
            const duplicados = resultados.filter(r => r.status === 409).length;
            const erros = resultados.filter(r => !r.ok && r.status !== 409).length;

            if (adicionados > 0)
                showToast(`${adicionados} atleta${adicionados > 1 ? 's adicionados' : ' adicionado'} com sucesso!`, 'success');
            if (duplicados > 0)
                showToast(`${duplicados} atleta${duplicados > 1 ? 's já estavam' : ' já estava'} vinculado${duplicados > 1 ? 's' : ''} a esta equipe.`, 'warning');
            if (erros > 0)
                showToast(`${erros} erro${erros > 1 ? 's' : ''} ao vincular. Tente novamente.`, 'danger');

            document.querySelectorAll('.check-atleta:checked').forEach(c => c.checked = false);
            atualizarContadorSelecionados();
            atualizarListaElenco(equipeId);
        }

        async function atualizarListaElenco(equipeId) {

            const res = await fetch(`${API}/equipes/${equipeId}/elenco`);
            const elenco = await res.json();

            elenco.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));

            const lista = document.getElementById('lista-elenco');
            lista.innerHTML = elenco.length ? '' : '<div class="p-3 text-center text-muted">Nenhum atleta vinculado ainda.</div>';
            elenco.forEach(at => {
                lista.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div><i class="bi bi-person me-2 text-secondary"></i><span class="fw-bold">${at.nome}</span></div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-sm btn-outline-danger" title="Remover" onclick="removerAtleta(${at.vinculoId}, ${equipeId})"><i class="bi bi-trash"></i></button>
                    </div>
                </div>`;
            });
        }

        async function removerAtleta(vinculoId, equipeId) {
            if (!confirm("Deseja remover este atleta da equipe?")) return;
            await fetch(`${API}/vinculos/${vinculoId}`, { method: 'DELETE' });
            atualizarListaElenco(equipeId);
        }

        async function limparElencoDaEquipe() {
            const equipeId = document.getElementById('equipe-id-vinculo').value;
            if (!confirm("Atenção! Deseja remover TODOS os atletas vinculados a esta equipe?")) return;
            const res = await fetch(`${API}/equipes/${equipeId}/elenco`, { method: 'DELETE' });
            if (res.ok) {
                atualizarListaElenco(equipeId);
            } else {
                showToast('Erro ao limpar elenco', 'danger');
            }
        }

        window.onload = init;

        // LIMPEZA AUTOMÁTICA DO MODAL (À Prova de Balas e com IDs Corretos)
        const modalEquipeEl = document.getElementById('modalEquipe');

        if (modalEquipeEl) {
            modalEquipeEl.addEventListener('hidden.bs.modal', () => {
                // 1. Limpa o formulário (ID corrigido)
                const form = document.getElementById('form-equipe');
                if (form) form.reset();

                // 2. Limpa o ID Oculto (ID corrigido e protegido)
                const inputId = document.getElementById('equipe-id');
                if (inputId) inputId.value = '';

                // 3. Limpa as URLs e Arquivos
                const logoUrlInput = document.getElementById('logoUrl');
                if (logoUrlInput) logoUrlInput.value = '';

                const fileInput = document.getElementById('logoFile');
                if (fileInput) fileInput.value = '';

                // 4. Esconde a prévia da imagem
                const previewContainer = document.getElementById('logo-preview-container');
                const previewImg = document.getElementById('logo-preview');

                if (previewContainer && previewImg) {
                    previewImg.src = '';
                    previewContainer.style.display = 'none';
                }

                // 5. Volta o título para o padrão (ID corrigido)
                const tituloModal = document.getElementById('modalTitulo');
                if (tituloModal) tituloModal.innerText = 'Cadastrar Equipe';

                // 6. Reseta o campo de categoria
                const categoriaSelect = document.getElementById('categoria');
                if (categoriaSelect) categoriaSelect.value = '';
            });
        }

    </script>
</body>

</html>
