<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Partida - Portal Esportivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="frontend/js/theme.js"></script>

    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
        }

        .header-partida {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: white;
            padding: 60px 0;
            border-radius: 0 0 40px 40px;
            margin-bottom: 40px;
        }

        .placar-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .gols-display {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
        }

        .sep {
            font-size: 3rem;
            opacity: 0.5;
            font-weight: 200;
        }

        .card-eventos {
            background: var(--bs-body-bg);
            border: 1px solid var(--bs-border-color-translucent);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 25px;
            height: 100%;
        }

        .table-eventos thead {
            background: #f1f5f9;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .table-eventos th {
            border: none;
            padding: 15px;
            color: #64748b;
        }

        .table-eventos td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .icon-stat {
            font-size: 1.2rem;
        }

        .icon-gol {
            color: #22c55e;
        }

        .icon-amarelo {
            color: #eab308;
        }

        .icon-vermelho {
            color: #ef4444;
        }

        .atleta-nome {
            font-weight: 600;
            color: var(--bs-body-color);
        }

        .btn-voltar {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            opacity: 1;
            transform: translateX(-5px);
        }

    </style>
</head>

<body>

    <section class="header-partida">
        <div class="container">
            <div class="d-flex justify-content-between align-items-start mb-1">
                <a href="javascript:void(0)" onclick="voltarPaginaAnterior()" class="btn-voltar mb-0" id="link-voltar">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>

            <div class="placar-box">
                <div class="row align-items-center justify-content-center w-100 mx-0">
                    <div class="col-4 text-center px-1">
                        <div id="logo-mandante-container" class="mb-2">
                            <a id="link-logo-mandante" href="#">
                                <i id="icon-mandante" class="bi bi-shield-shaded fs-1 fs-md-1 opacity-50"></i>
                                <img id="img-logo-mandante" src="" alt=""
                                    style="max-height: 55px; object-fit: contain; display: none;">
                            </a>
                        </div>
                        <div id="nome-mandante" class="text-wrap fw-bold mt-2 lh-sm text-uppercase" style="font-size: 0.70rem; word-break: normal;">--</div>
                    </div>
                    <div class="col-4 text-center px-0 d-flex justify-content-center align-items-center flex-wrap">
                        <span id="penaltis-mandante" class="text-white-50 fw-bold fs-6 fs-md-5 mb-0" style="display:none;">(0)</span>
                        <div class="d-flex flex-row justify-content-center align-items-center flex-nowrap mx-1">
                            <span id="gols-mandante" class="fw-bold fs-1">0</span>
                            <span class="mx-1 text-white-50 fs-4">X</span>
                            <span id="gols-visitante" class="fw-bold fs-1">0</span>
                        </div>
                        <span id="penaltis-visitante" class="text-white-50 fw-bold fs-6 fs-md-5 mb-0" style="display:none;">(0)</span>
                    </div>
                    <div class="col-4 text-center px-1">
                        <div id="logo-visitante-container" class="mb-2">
                            <a id="link-logo-visitante" href="#">
                                <i id="icon-visitante" class="bi bi-shield-shaded fs-1 fs-md-1 opacity-50"></i>
                                <img id="img-logo-visitante" src="" alt=""
                                    style="max-height: 55px; object-fit: contain; display: none;">
                            </a>
                        </div>
                        <div id="nome-visitante" class="text-wrap fw-bold mt-2 lh-sm text-uppercase" style="font-size: 0.70rem; word-break: normal;">--</div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="mb-0 opacity-100 d-flex flex-wrap justify-content-center gap-2 fw-semibold text-uppercase" style="letter-spacing: 0.5px; font-size: 0.95rem;">
                    <span id="chave-container" style="display:none;" class="text-nowrap">
                        <span id="chave-texto">--</span> <span class="mx-md-3 mx-1 opacity-50">|</span>
                    </span>
                    <span class="text-nowrap">JOGO <span id="jogo-numero">--</span></span>
                    <span class="mx-md-3 mx-1 opacity-50 d-none d-md-inline">|</span>
                    <span class="text-nowrap"><i class="bi bi-geo-alt me-1"></i> <span id="local-jogo">--</span></span>
                    <span class="mx-md-3 mx-1 opacity-50 d-none d-md-inline">|</span>
                    <span class="text-nowrap"><i class="bi bi-calendar-event me-1"></i> <span id="data-jogo">--</span></span>
                    <span class="mx-md-3 mx-1 opacity-50 d-none d-md-inline">|</span>
                    <span class="text-nowrap"><i class="bi bi-clock me-1"></i> <span id="horario-jogo">--</span></span>
                </p>
            </div>
        </div>
    </section>

    <div class="container mb-5">
        <div class="row g-4">
            <!-- Mandante -->
            <div class="col-lg-6">
                <div class="card-eventos">
                    <h4 class="fw-bold mb-4 d-flex align-items-center gap-2">
                        <img id="label-img-mandante" src="" alt=""
                            style="width:28px;height:28px;object-fit:contain;display:none;">
                        <i id="label-icon-mandante" class="bi bi-shield-fill text-primary"></i>
                        <span id="label-mandante">Mandante</span>
                    </h4>
                    <div class="table-responsive">
                        <table class="table table-eventos">
                            <thead>
                                <tr>
                                    <th>Atleta</th>
                                    <th class="text-center">Gols</th>
                                    <th class="text-center text-warning" title="Amarelo">C.A</th>
                                    <th class="text-center text-danger" title="Vermelho">C.V</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-mandante"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Visitante -->
            <div class="col-lg-6">
                <div class="card-eventos">
                    <h4 class="fw-bold mb-4 d-flex align-items-center gap-2">
                        <img id="label-img-visitante" src="" alt=""
                            style="width:28px;height:28px;object-fit:contain;display:none;">
                        <i id="label-icon-visitante" class="bi bi-shield-fill text-secondary"></i>
                        <span id="label-visitante">Visitante</span>
                    </h4>
                    <div class="table-responsive">
                        <table class="table table-eventos">
                            <thead>
                                <tr>
                                    <th>Atleta</th>
                                    <th class="text-center">Gols</th>
                                    <th class="text-center text-warning" title="Amarelo">C.A</th>
                                    <th class="text-center text-danger" title="Vermelho">C.V</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-visitante"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="frontend/js/main.js?v=1.1"></script>

    <script>

        const params = new URLSearchParams(window.location.search);
        const jogoId = params.get('jogoId');
        const slug = params.get('p');

        const campId = params.get('campId');

        // O botão agora utiliza histórico natural do navegador pelo voltarPaginaAnterior()

        async function carregarDetalhes() {
            if (!jogoId) return;

            try {
                const res = await fetch(`${API}/jogos/${jogoId}/detalhes`);
                const data = await res.json();
                const jogo = data.jogo;

                document.getElementById('nome-mandante').textContent = jogo.mandanteNome;
                document.getElementById('nome-visitante').textContent = jogo.visitanteNome;
                document.getElementById('label-mandante').textContent = jogo.mandanteNome;
                document.getElementById('label-visitante').textContent = jogo.visitanteNome;

                // Logos das equipes
                function aplicarLogo(imgId, iconId, labelImgId, labelIconId, logoUrl) {
                    if (logoUrl) {
                        document.getElementById(imgId).src = logoUrl;
                        document.getElementById(imgId).style.display = 'inline-block';
                        document.getElementById(iconId).style.display = 'none';
                        document.getElementById(labelImgId).src = logoUrl;
                        document.getElementById(labelImgId).style.display = 'inline-block';
                        document.getElementById(labelIconId).style.display = 'none';
                    }
                }
                aplicarLogo('img-logo-mandante', 'icon-mandante', 'label-img-mandante', 'label-icon-mandante', jogo.mandante?.logoUrl);
                aplicarLogo('img-logo-visitante', 'icon-visitante', 'label-img-visitante', 'label-icon-visitante', jogo.visitante?.logoUrl);

                // Configura links dos logos para as páginas de equipe
                const slugParam = slug ? `&slug=${slug}` : '';
                const linkMandante = document.getElementById('link-logo-mandante');
                if (linkMandante && jogo.mandanteId) linkMandante.href = `equipe.html?id=${jogo.mandanteId}${slugParam}`;
                const linkVisitante = document.getElementById('link-logo-visitante');
                if (linkVisitante && jogo.visitanteId) linkVisitante.href = `equipe.html?id=${jogo.visitanteId}${slugParam}`;

                document.getElementById('gols-mandante').textContent = jogo.golsMandante;
                document.getElementById('gols-visitante').textContent = jogo.golsVisitante;
                
                if (jogo.penaltisMandante !== null && jogo.penaltisMandante !== undefined) {
                    document.getElementById('penaltis-mandante').textContent = `(${jogo.penaltisMandante})`;
                    document.getElementById('penaltis-visitante').textContent = `(${jogo.penaltisVisitante})`;
                    document.getElementById('penaltis-mandante').style.display = 'inline-block';
                    document.getElementById('penaltis-visitante').style.display = 'inline-block';
                }

                document.getElementById('jogo-numero').textContent = jogo.numero;

                if (jogo.chave) {
                    const label = jogo.chave.toUpperCase().includes('CHAVE') ? jogo.chave : 'CHAVE ' + jogo.chave;
                    document.getElementById('chave-texto').textContent = label;
                    document.getElementById('chave-container').style.display = 'inline-block';
                } else {
                    document.getElementById('chave-container').style.display = 'none';
                }

                document.getElementById('local-jogo').textContent = jogo.local || 'Local a definir';
                document.getElementById('data-jogo').textContent = jogo.data ? jogo.data.split('-').reverse().join('/') : 'Data a definir';
                document.getElementById('horario-jogo').textContent = jogo.horario || 'Horário a definir';

                preencherTabela('corpo-mandante', data.elencoMandante);
                preencherTabela('corpo-visitante', data.elencoVisitante);

            } catch (e) { console.error(e); }
        }

        function preencherTabela(tbodyId, elenco) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';

            let teveEvento = false;

            elenco.forEach(at => {
                // Soma gols (normais + contra)
                const totalGols = (at.gols || 0) + (at.gc || 0);
                const am = at.am || 0;
                const vm = at.vm || 0;

                if (totalGols > 0 || am > 0 || vm > 0) {
                    teveEvento = true;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                    <td>
                        <div class="atleta-nome">
                            ${at.nome}
                        </div>
                    </td>
                    <td class="text-center">
                        ${totalGols > 0 ? `<span class="fw-bold">${totalGols}</span> <i class="bi bi-soccer-ball icon-gol ms-1"></i>` : '--'}
                        ${at.gc > 0 ? `<br><small class="text-danger" style="font-size:0.6rem">(${at.gc} Contra)</small>` : ''}
                    </td>
                    <td class="text-center">
                        ${am > 0 ? `<span class="fw-bold text-warning">${am}</span> <i class="bi bi-square-fill icon-amarelo ms-1" style="font-size:0.8rem"></i>` : '--'}
                    </td>
                    <td class="text-center">
                        ${vm > 0 ? `<span class="fw-bold text-danger">${vm}</span> <i class="bi bi-square-fill icon-vermelho ms-1" style="font-size:0.8rem"></i>` : '--'}
                    </td>
                `;
                    tbody.appendChild(tr);
                }
            });

            if (!teveEvento) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Sem estatísticas registradas.</td></tr>';
            }
        }

        window.onload = carregarDetalhes;
    </script>
</body>

</html>
