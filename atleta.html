<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Perfil do Atleta - Placar Municipal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --surface: #ffffff;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
        }

        .navbar {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .athlete-hero {
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%);
            color: white;
            padding: 60px 0;
            border-radius: 0 0 40px 40px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e2e8f0;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 30px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -34px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .club-card {
            background: white;
            padding: 15px 20px;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a href="#" id="btn-voltar" class="btn btn-outline-dark rounded-pill px-4 fw-bold">
                <i class="bi bi-arrow-left me-2"></i>Voltar
            </a>
            <span class="navbar-brand ms-auto" id="nav-brand">PLACAR MUNICIPAL</span>
        </div>
    </nav>

    <header class="athlete-hero">
        <div class="container text-center">
            <div class="mb-3">
                <div class="d-inline-flex align-items-center justify-content-center bg-white text-primary rounded-circle shadow-lg" style="width: 80px; height: 80px;">
                    <i class="bi bi-person-fill fs-1"></i>
                </div>
            </div>
            <h1 class="display-5 fw-800 mb-2" id="atleta-nome">CARREGANDO...</h1>
            <p class="opacity-75 fw-bold" id="atleta-meta">PERFIL DO ATLETA</p>
        </div>
    </header>

    <div class="container">
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="text-muted small fw-bold text-uppercase mb-2">Gols no Sistema</div>
                    <div class="stat-value" id="atleta-gols">0</div>
                    <div class="mt-2 small fw-bold text-primary">HISTÓRICO TOTAL</div>
                </div>
            </div>
            <div class="col-md-8">
                <h4 class="fw-800 mb-4"><i class="bi bi-clock-history me-2"></i>Linha do Tempo de Clubes</h4>
                <div class="timeline" id="container-timeline">
                    <!-- Timeline Items -->
                </div>
            </div>
        </div>
    </div>

    <script src="frontend/js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const atletaId = urlParams.get('id');
        const slug = urlParams.get('slug') || urlParams.get('p') || 'principal';

        document.addEventListener('DOMContentLoaded', async () => {
            if (!atletaId) {
                window.location.href = 'portal.html';
                return;
            }

            document.getElementById('btn-voltar').href = `portal.html?slug=${slug}`;
            
            await loadConfig();
            await loadAtletaData();
        });

        async function loadConfig() {
            try {
                const res = await fetch(`${API}/configuracao?slug=${slug}`);
                if (!res.ok) return;
                const config = await res.json();
                document.getElementById('nav-brand').innerText = config.nome.toUpperCase();
                if (config.corPrimaria) {
                    const s = document.createElement('style');
                    s.innerHTML = `:root { --accent: ${config.corPrimaria}; } .athlete-hero { background: linear-gradient(135deg, ${config.corPrimaria} 0%, #0f172a 100%) !important; }`;
                    document.head.appendChild(s);
                }
            } catch (e) { console.error(e); }
        }

        async function loadAtletaData() {
            try {
                const res = await fetch(`${API}/atletas/${atletaId}/historico`);
                if (!res.ok) throw new Error();
                const data = await res.json();

                document.title = `${data.nome} - Placar Municipal`;
                document.getElementById('atleta-nome').innerText = data.nome.toUpperCase();
                document.getElementById('atleta-gols').innerText = data.totalGols || 0;

                const timeline = document.getElementById('container-timeline');
                if (!data.vinculos || data.vinculos.length === 0) {
                    timeline.innerHTML = '<p class="text-muted">Nenhum vínculo histórico encontrado.</p>';
                    return;
                }

                timeline.innerHTML = data.vinculos.map(v => `
                    <div class="timeline-item">
                        <div class="club-card">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <div class="fw-800 h5 mb-0">${v.equipe?.nome.toUpperCase()}</div>
                                    <div class="small text-muted fw-bold"><i class="bi bi-geo-alt me-1"></i>${v.equipe?.prefeitura?.nome || 'Município não informado'}</div>
                                </div>
                                <div class="text-end">
                                    <span class="badge bg-light text-dark border rounded-pill">${v.tipo || 'Atleta'}</span>
                                    ${v.dataFim ? `<div class="x-small text-muted mt-1">Até ${v.dataFim}</div>` : '<div class="x-small text-success fw-bold mt-1">Atual</div>'}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
