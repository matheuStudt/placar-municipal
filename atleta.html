<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Perfil do Atleta - Placar Municipal</title>
    <meta name="description" content="Perfil e estatísticas do atleta no portal de esportes municipais.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --gold: #fbbf24;
            --surface: #ffffff;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Botão Voltar */
        .btn-voltar {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            opacity: 1;
            transform: translateX(-5px);
            color: white;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: white;
            padding: 70px 0 90px;
            border-radius: 0 0 48px 48px;
            margin-bottom: -48px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -10%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.22) 0%, transparent 70%);
        }

        .hero .container {
            position: relative;
            z-index: 1;
        }

        /* Gols quick stat badge */
        .gols-stat-badge {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 16px 32px;
            min-width: 140px;
            margin-top: 20px;
        }

        .gols-stat-number {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--gold);
        }

        .gols-stat-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 4px;
        }

        /* Content section */
        .section-content {
            padding-top: 80px;
            padding-bottom: 60px;
        }

        /* Club card */
        .club-card {
            background: white;
            padding: 16px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        .club-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.1);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e2e8f0;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -34px;
            top: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Footer */
        footer {
            background: var(--primary);
            color: white;
            padding: 40px 0;
            margin-top: 80px;
        }
    </style>
</head>

<body>
    <!-- Hero -->
    <header class="hero">
        <div class="container text-center">
            <div class="text-start">
                <a href="#" id="btn-voltar" class="btn-voltar">
                    <i class="bi bi-arrow-left"></i> Voltar ao Portal
                </a>
            </div>
            <div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-10 rounded-circle mb-3" style="width: 88px; height: 88px;">
                <i class="bi bi-person-fill fs-1 text-white"></i>
            </div>
            <h1 class="display-5 fw-bold mb-1 text-white" id="atleta-nome">CARREGANDO...</h1>
            <p class="text-white-50 fw-semibold mb-0" id="atleta-posicao">PERFIL DO ATLETA</p>

            <!-- Estatística Rápida: Gols -->
            <div id="gols-stat-container" class="d-flex justify-content-center mt-3">
                <div class="gols-stat-badge">
                    <span class="gols-stat-number" id="atleta-gols">0</span>
                    <span class="gols-stat-label"><i class="bi bi-soccer-ball me-1"></i>Gols no Sistema</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container section-content">
            <div class="row g-4">
                <!-- Timeline de Clubes -->
                <div class="col-12">
                    <div class="card border-0 shadow-sm rounded-4 p-4">
                        <h4 class="fw-bold mb-4">
                            <i class="bi bi-clock-history text-primary me-2"></i>Histórico de Clubes
                        </h4>
                        <div class="timeline" id="container-timeline">
                            <!-- Skeletons -->
                            <div class="timeline-item">
                                <div class="skeleton" style="height: 80px; border-radius: 20px;"></div>
                            </div>
                            <div class="timeline-item">
                                <div class="skeleton" style="height: 80px; border-radius: 20px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="text-white-50 small mb-0">&copy; 2026 Placar Municipal - Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="frontend/js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const atletaId = urlParams.get('id');
        const slug = urlParams.get('slug') || urlParams.get('p') || 'principal';

        document.addEventListener('DOMContentLoaded', async () => {
            if (!atletaId) {
                window.location.href = 'portal.html';
                return;
            }

            document.getElementById('btn-voltar').href = `portal.html?slug=${slug}`;

            await loadConfig();
            await loadAtletaData();
        });

        async function loadConfig() {
            try {
                const res = await fetch(`${API}/configuracao?slug=${slug}`);
                if (!res.ok) return;
                const config = await res.json();

                if (config.corPrimaria) {
                    const s = document.createElement('style');
                    s.innerHTML = `
                        :root { --accent: ${config.corPrimaria}; }
                        .hero { background: linear-gradient(135deg, ${config.corPrimaria} 0%, #0f172a 100%) !important; }
                        .bg-primary { background-color: ${config.corPrimaria} !important; }
                        .text-primary { color: ${config.corPrimaria} !important; }
                    `;
                    document.head.appendChild(s);
                }
            } catch (e) { console.error(e); }
        }

        async function loadAtletaData() {
            try {
                const res = await fetch(`${API}/atletas/${atletaId}/historico`);
                if (!res.ok) throw new Error();
                const data = await res.json();

                document.title = `${data.nome} - Placar Municipal`;
                document.getElementById('atleta-nome').textContent = data.nome.toUpperCase();
                document.getElementById('atleta-gols').textContent = data.totalGols || 0;

                const timeline = document.getElementById('container-timeline');
                if (!data.vinculos || data.vinculos.length === 0) {
                    timeline.innerHTML = '<p class="text-muted"><i class="bi bi-info-circle me-2"></i>Nenhum vínculo histórico encontrado.</p>';
                    return;
                }

                timeline.innerHTML = data.vinculos.map(v => `
                    <div class="timeline-item">
                        <div class="club-card">
                            <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
                                <div>
                                    <div class="fw-bold fs-5 mb-0">${v.equipe?.nome?.toUpperCase() || 'Equipe desconhecida'}</div>
                                    <div class="small text-muted fw-semibold mt-1">
                                        <i class="bi bi-geo-alt me-1"></i>${v.equipe?.prefeitura?.nome || 'Município não informado'}
                                    </div>
                                </div>
                                <div class="text-start text-md-end pt-2 pt-md-0 border-top border-md-0 border-light w-100 w-md-auto">
                                    <span class="badge bg-light text-dark border rounded-pill px-3 py-2">${v.tipo || 'Atleta'}</span>
                                    ${v.dataFim
                                        ? `<div class="x-small text-muted mt-2 small lh-1">Até ${v.dataFim}</div>`
                                        : '<div class="small text-success fw-bold mt-2 lh-1"><i class="bi bi-circle-fill me-1" style="font-size:0.5rem;"></i>Atual</div>'
                                    }
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('container-timeline').innerHTML = '<p class="text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Erro ao carregar dados do atleta.</p>';
                console.error(e);
            }
        }
    </script>
</body>

</html>
